<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE · Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --ink:#0E1116;--g600:#3A4250;--g500:#5C6675;--g400:#8A95A4;
  --m200:#D7DCE3;--m100:#ECEFF3;--bone:#F5F6F8;--white:#FFFFFF;
  --b700:#174876;--b600:#1E5A91;--b500:#2C72AE;--b100:#E1ECF5;
  --a700:#8C5A14;--a500:#D8902B;--a100:#FBF1DE;
  --s600:#2F7D5B;--s100:#E1F0E8;
  --d600:#B5392E;--d100:#F8E2DF;
  --fd:'Space Grotesk',system-ui;--fs:'Inter',system-ui;--fm:'JetBrains Mono',monospace;
  --sh1:0 1px 2px rgba(14,17,22,.06);--sh2:0 4px 12px rgba(14,17,22,.10);--sh3:0 12px 32px rgba(14,17,22,.14);
  --ease:cubic-bezier(.2,0,.2,1);
}
html,body{font-family:var(--fs);background:var(--bone);color:var(--ink);height:100vh;overflow:hidden}
#nc{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.06}
body{display:grid;grid-template-rows:56px 1fr;position:relative}
header{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--m200);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:50;box-shadow:var(--sh1)}
.brand{display:flex;align-items:center;gap:9px}
.bmark{width:28px;height:28px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center}
.bmark svg{width:16px;height:16px}
.bname{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.02em}
.bname em{color:var(--g500);font-weight:400;font-style:normal}
.hctr{display:flex;align-items:center;gap:10px}
.wnav{display:flex;align-items:center;gap:5px}
.wnav button{width:26px;height:26px;border:1px solid var(--m200);background:var(--white);border-radius:6px;cursor:pointer;font-size:14px;color:var(--g600);display:flex;align-items:center;justify-content:center;transition:all 120ms}
.wnav button:hover{background:var(--m100)}
.wlbl{font-family:var(--fm);font-size:11px;color:var(--g500);min-width:110px;text-align:center}
.zwrap{display:flex;align-items:center;gap:6px;background:var(--m100);border:1px solid var(--m200);border-radius:10px;padding:3px 10px}
.zlbl{font-family:var(--fm);font-size:9px;color:var(--g400)}
#zs{width:72px;accent-color:var(--b600);cursor:pointer}
.hrt{display:flex;align-items:center;gap:8px}
.hdate{font-family:var(--fm);font-size:11px;color:var(--g400)}
.hbtn{padding:6px 14px;border:none;border-radius:6px;font-family:var(--fs);font-size:12px;font-weight:500;cursor:pointer;transition:all 120ms}
.hbtn.p{background:var(--b600);color:#fff}.hbtn.p:hover{background:var(--b700)}
.hbtn.s{background:var(--m100);color:var(--ink);border:1px solid var(--m200)}.hbtn.s:hover{background:var(--m200)}
main{display:grid;grid-template-columns:196px 1fr;overflow:hidden;position:relative;z-index:1}
aside{background:rgba(255,255,255,.92);border-right:1px solid var(--m200);padding:14px 11px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.slbl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g400);margin-bottom:4px}
.nav{display:flex;flex-direction:column;gap:2px}
.snbtn{padding:7px 9px;background:transparent;border:1px solid transparent;border-radius:6px;font-size:12px;font-weight:500;color:var(--g600);cursor:pointer;transition:all 120ms;text-align:left;width:100%;display:flex;align-items:center;gap:6px}
.snbtn:hover{background:var(--m100);color:var(--ink)}.snbtn.on{background:var(--b100);color:var(--b600);border-color:#B7D2E6;font-weight:600}
.snbtn .nd{width:13px;height:13px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snbtn .nd::after{content:'';width:4px;height:4px;border-radius:50%;background:currentColor}
.clist{display:flex;flex-direction:column;gap:3px}
.cli{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--g600);transition:all 100ms}
.cli:hover{background:var(--m100)}.cli input{accent-color:var(--b600);width:12px;height:12px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sdiv{height:1px;background:var(--m200)}
.sinfo{font-size:11px;color:var(--g600);line-height:1.8}
.sinfo code{font-family:var(--fm);font-size:10px;background:var(--m100);padding:1px 5px;border-radius:3px;color:var(--g500)}
.content{overflow:hidden;display:flex;flex-direction:column}
.tab{display:none;flex:1;overflow:hidden}.tab.on{display:flex;flex-direction:column}

/* GANTT */
.gwrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.cbar{padding:6px 16px;background:var(--d100);border-bottom:1px solid rgba(181,57,46,.2);font-size:11px;color:var(--d600);display:none;align-items:center;gap:6px}
.cbar.show{display:flex}
.ghead{display:flex;background:var(--white);border-bottom:1px solid var(--m200);box-shadow:var(--sh1);z-index:10;flex-shrink:0}
.gcnr{width:64px;flex-shrink:0;border-right:1px solid var(--m200);padding:8px;display:flex;align-items:flex-end;font-family:var(--fm);font-size:9px;color:var(--g400)}
.gdays{display:flex;flex:1;overflow:hidden}
.gdh{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border-right:1px solid var(--m100);cursor:pointer;transition:background 120ms;flex:1}
.gdh:hover{background:var(--bone)}.gdh.today{background:var(--b100)}.gdh.blocked{background:rgba(30,90,145,.05)}
.dname{font-family:var(--fd);font-size:10px;font-weight:600;color:var(--g600)}
.dnum{font-family:var(--fm);font-size:17px;font-weight:500;color:var(--ink);line-height:1.1}
.dtag{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.dtag.vt{color:var(--b600)}.dtag.ft{color:var(--s600)}
.gbody{flex:1;overflow:auto;display:flex}
.gtc{width:64px;flex-shrink:0;border-right:1px solid var(--m200);background:var(--white);position:sticky;left:0;z-index:5}
.tslot{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 8px 0 0;border-bottom:1px solid var(--m100);font-family:var(--fm);font-size:9px;color:var(--g400)}
.tslot.maj{border-bottom-color:var(--m200)}
.ggrid{flex:1;position:relative;-webkit-user-select:none;user-select:none}
.gcol{position:absolute;top:0;bottom:0;border-right:1px solid var(--m100)}
.gcol.blk{background:repeating-linear-gradient(-45deg,transparent,transparent 7px,rgba(30,90,145,.025) 7px,rgba(30,90,145,.025) 14px)}
.gcol.wknd{background:rgba(216,144,43,.025)}
.hline{position:absolute;left:0;right:0;border-top:1px solid var(--eee,#eee);pointer-events:none}
.hline.maj{border-top-color:var(--m200)}
.nowline{position:absolute;left:0;right:0;border-top:2px solid var(--d600);pointer-events:none;z-index:8;opacity:.65}
.nowline::before{content:'';position:absolute;left:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--d600)}
.blbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.blbl span{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--b600);letter-spacing:.1em;text-transform:uppercase;opacity:.35;writing-mode:vertical-rl;transform:rotate(180deg)}
/* EVENTS */
.gevt{position:absolute;padding:3px 20px 3px 8px;border-left:2px solid transparent;overflow:hidden;min-height:24px;transition:box-shadow 120ms;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none}
.gevt:hover{box-shadow:var(--sh2);z-index:20}
.gevt.dragging{opacity:.72;box-shadow:var(--sh3);z-index:100;cursor:grabbing;transition:none}
.gevt.done-ev{opacity:.45}.gevt.done-ev .etitle{text-decoration:line-through}
.etime{font-family:var(--fm);font-size:9px;opacity:.7;white-space:nowrap}
.etitle{font-size:10px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:9px;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.echk{position:absolute;top:4px;right:4px;width:13px;height:13px;cursor:pointer;accent-color:var(--s600);z-index:5}
.vier-ev{background:var(--b100);color:#11365F;border-left-color:var(--b600)}
.dimer-ev{background:var(--a100);color:var(--a700);border-left-color:var(--a500)}
.core-ev{background:var(--m100);color:var(--g600);border-left-color:var(--g500)}
.avalon-ev{background:var(--s100);color:var(--s600);border-left-color:var(--s600)}
.routine-ev{opacity:.82}
/* TOOLTIP */
.tt{position:fixed;background:var(--ink);color:#fff;border-radius:10px;padding:9px 12px;font-size:11px;pointer-events:none;z-index:300;box-shadow:var(--sh3);max-width:200px;opacity:0;transition:opacity 100ms}
.tt.show{opacity:1}
.ttt{font-family:var(--fm);font-size:9px;color:var(--g400);margin-bottom:3px}
.ttl{font-weight:600;font-size:12px;margin-bottom:2px}.tts{font-size:10px;color:var(--g400)}
/* TASKS */
.twrap{flex:1;overflow-y:auto;padding:20px}
.tfilters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tfbtn{padding:5px 12px;border:1px solid var(--m200);background:var(--white);border-radius:999px;font-size:11px;cursor:pointer;transition:all 120ms;color:var(--g600)}
.tfbtn.on{background:var(--b600);color:#fff;border-color:var(--b600)}
.tklist{display:flex;flex-direction:column;gap:8px;max-width:680px}
.tkcard{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:12px 14px;box-shadow:var(--sh1);display:flex;align-items:flex-start;gap:10px;transition:all 120ms}
.tkcard:hover{background:var(--bone)}
.tkcard.done-task .tktitle{text-decoration:line-through;color:var(--g400)}
.tkchk{width:17px;height:17px;accent-color:var(--b600);cursor:pointer;flex-shrink:0;margin-top:2px}
.tkbody{flex:1;cursor:pointer}
.tktitle{font-size:13px;font-weight:500;margin-bottom:4px}
.tkmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tkcli{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:600}
.tkdue{font-family:var(--fm);font-size:10px;color:var(--g500)}
.tkdue.ov{color:var(--d600);font-weight:600}.tkdue.tod{color:var(--a700);font-weight:600}
.tkprio{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.ph{background:var(--d100);color:var(--d600)}.pm{background:var(--a100);color:var(--a700)}.pl{background:var(--s100);color:var(--s600)}
.tkdel{padding:4px 8px;border:1px solid var(--m200);background:transparent;border-radius:6px;font-size:11px;color:var(--g500);cursor:pointer;transition:all 100ms;flex-shrink:0}
.tkdel:hover{background:var(--d100);color:var(--d600)}
/* DASHBOARD */
.dwrap{flex:1;overflow-y:auto;padding:20px}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:14px 16px;box-shadow:var(--sh1)}
.klbl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--g500);margin-bottom:8px}
.kval{font-family:var(--fm);font-size:26px;font-weight:500;color:var(--ink);line-height:1}
.ksub{font-size:11px;color:var(--g500);margin-top:4px}
.kval.pos{color:var(--s600)}.kval.warn{color:var(--a500)}
.bchart{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:16px;box-shadow:var(--sh1);margin-bottom:12px}
.bchart h4{font-family:var(--fd);font-size:12px;font-weight:600;margin-bottom:14px}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.blbl2{font-size:11px;color:var(--g600);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrack{flex:1;height:7px;background:var(--m100);border-radius:999px;overflow:hidden}
.bfill{height:100%;border-radius:999px;transition:width .4s var(--ease)}
.bval{font-family:var(--fm);font-size:10px;color:var(--g500);width:30px;text-align:right}
.drow2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.scard{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:14px 16px;box-shadow:var(--sh1)}
.snum{font-family:var(--fm);font-size:36px;font-weight:500;color:var(--b600)}
.rdash{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:14px 16px;box-shadow:var(--sh1)}
.rrow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--m100);font-size:12px}
.rrow:last-child{border-bottom:none}
/* AI SUMMARY */
.ai-card{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:16px;box-shadow:var(--sh1)}
.ai-card h4{font-family:var(--fd);font-size:12px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-body{font-size:13px;color:var(--g600);line-height:1.7;white-space:pre-wrap}
.ai-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g500)}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--b600);animation:pulse 1s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
/* CLIENTS */
.clwrap{flex:1;overflow-y:auto;padding:20px}
.clgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.clcard{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:16px;box-shadow:var(--sh1);position:relative}
.cltop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.clav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.clname{font-family:var(--fd);font-size:14px;font-weight:600}.cltype{font-size:11px;color:var(--g500)}
.clst{position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.sta{background:var(--s100);color:var(--s600)}.stn{background:var(--a100);color:var(--a700)}.sti{background:var(--m100);color:var(--g500)}
.clinfo{font-size:11px;color:var(--g600);line-height:1.8}
.clact{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--m200)}
.cabtn{padding:5px 10px;border:1px solid var(--m200);background:transparent;border-radius:6px;font-size:11px;color:var(--g600);cursor:pointer;transition:all 100ms}
.cabtn:hover{background:var(--m100)}
/* YEAR */
.ycal{display:grid;grid-template-columns:repeat(auto-fit,minmax(196px,1fr));gap:12px;padding:16px;overflow-y:auto;flex:1}
.mcrd{background:var(--white);border:1px solid var(--m200);border-radius:10px;overflow:hidden;box-shadow:var(--sh1)}
.mhdr{background:var(--m100);padding:7px 11px;font-family:var(--fd);font-size:11px;font-weight:600;border-bottom:1px solid var(--m200)}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:7px}
.wdl{text-align:center;font-size:8px;color:var(--g500);padding:2px 0;font-weight:600;text-transform:uppercase}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:3px;color:var(--g600);cursor:pointer;transition:all 100ms}
.cd:hover{background:var(--m100)}.cd.other{color:#C8CDD4}.cd.hasev{background:var(--b100);color:var(--b600);font-weight:600}.cd.hastask{background:var(--a100);color:var(--a700)}.cd.today{background:var(--b600);color:#fff;font-weight:600}.cd.blkd{background:rgba(30,90,145,.07);color:var(--b600)}
/* ROUTINES */
.rwrap{padding:20px;overflow-y:auto;flex:1}
.rlist{display:flex;flex-direction:column;gap:7px;max-width:540px}
.rcrd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--white);border:1px solid var(--m200);border-radius:10px;transition:all 120ms;box-shadow:var(--sh1)}
.rcrd:hover{background:var(--bone)}.rcrd.done .rn{text-decoration:line-through;color:var(--g400)}
.rn{font-weight:500;font-size:13px}.rm{font-size:11px;color:var(--g500);margin-top:2px}
.rcrd input[type=checkbox]{accent-color:var(--b600);width:15px;height:15px;cursor:pointer}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(14,17,22,.52);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 180ms}
.mbg.open{opacity:1;pointer-events:all}
.mbox{background:var(--white);border-radius:14px;padding:22px;max-width:480px;width:92%;box-shadow:var(--sh3);transform:translateY(10px);transition:transform 180ms;border:1px solid var(--m200)}
.mbg.open .mbox{transform:translateY(0)}.mbox.wide{max-width:520px}
.mttl{font-family:var(--fd);font-size:17px;font-weight:600;margin:0 0 18px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g600)}
.fi,.fsel,.fta{padding:8px 11px;border:1px solid var(--m200);border-radius:6px;font-family:var(--fs);font-size:13px;color:var(--ink);background:var(--white);width:100%;transition:all 120ms}
.fta{resize:vertical;min-height:72px;line-height:1.5}
.fi:focus,.fsel:focus,.fta:focus{outline:0;border-color:var(--b600);box-shadow:0 0 0 3px rgba(30,90,145,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mbtns button{padding:8px 15px;border:none;border-radius:6px;font-family:var(--fs);font-size:12px;font-weight:600;cursor:pointer;transition:all 120ms}
.mbcancel{background:var(--m100);color:var(--ink);border:1px solid var(--m200)}.mbcancel:hover{background:var(--m200)}
.mbsave{background:var(--b600);color:#fff}.mbsave:hover{background:var(--b700)}
.mbdel{background:var(--d100);color:var(--d600);border:1px solid rgba(181,57,46,.3)}.mbdel:hover{background:var(--d600);color:#fff}
.recur-sec{background:var(--bone);border:1px solid var(--m200);border-radius:6px;padding:10px 12px;margin-bottom:12px}
.recur-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--g600)}
.recur-toggle input{accent-color:var(--b600)}
.recur-opts{margin-top:10px;display:none;flex-direction:column;gap:8px}
.recur-opts.show{display:flex}
.cpicker{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.copt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 120ms}
.copt.sel{border-color:var(--ink);transform:scale(1.15)}
</style>
</head>
<body>
<canvas id="nc"></canvas>
<header>
  <div class="brand">
    <div class="bmark">
      <svg viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="2" fill="#D8902B"/>
        <circle cx="2" cy="4" r="1.2" fill="white" opacity=".7"/>
        <circle cx="14" cy="4" r="1.2" fill="white" opacity=".7"/>
        <circle cx="2" cy="12" r="1.2" fill="white" opacity=".7"/>
        <circle cx="14" cy="12" r="1.2" fill="white" opacity=".7"/>
        <line x1="3.2" y1="4" x2="6" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
        <line x1="12.8" y1="4" x2="10" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
        <line x1="3.2" y1="12" x2="6" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
        <line x1="12.8" y1="12" x2="10" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
      </svg>
    </div>
    <div class="bname">CORE <em>· agenda</em></div>
  </div>
  <div class="hctr">
    <div class="wnav">
      <button onclick="pw()">‹</button>
      <span class="wlbl" id="wlbl"></span>

<script>
// NEURAL
(function(){const c=document.getElementById('nc'),ctx=c.getContext('2d');let n=[],W,H;function r(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;n=Array.from({length:22},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:Math.random()*1.4+.7}))}function d(){ctx.clearRect(0,0,W,H);for(let i=0;i<n.length;i++)for(let j=i+1;j<n.length;j++){const dx=n[i].x-n[j].x,dy=n[i].y-n[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<148){ctx.beginPath();ctx.moveTo(n[i].x,n[i].y);ctx.lineTo(n[j].x,n[j].y);ctx.strokeStyle=`rgba(30,90,145,${.65*(1-dist/148)})`;ctx.lineWidth=.6;ctx.stroke()}}n.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(30,90,145,.4)';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1});requestAnimationFrame(d)}window.addEventListener('resize',r);r();d();})();

const SH=8,EH=19,HPX=60,BLOCKED=[2,4];
const COLORS=['#1E5A91','#D8902B','#3A4250','#2F7D5B','#B5392E','#8C5A14','#5C6675','#0B2746'];

const A={
  events:JSON.parse(localStorage.getItem('coreEv')||'[]'),
  tasks:JSON.parse(localStorage.getItem('coreTasks')||'[]'),

  done:JSON.parse(localStorage.getItem('coreDone')||'{}'),
  cli:{},types:{routine:true,event:true},
  mon:monday(new Date()),tab:'gantt',zoom:7,
  editEvId:null,editTaskId:null,editCliId:null,taskFilter:'all'

function defC(){return[{id:'vier',name:'Vier Engenharia',type:'engenharia',contact:'Equipe Vier',status:'active',projects:'5 obras ativas',notes:'Presença ter/qui em Cricíuma',color:'#1E5A91'},{id:'dimer',name:'R. Dimer Empreendimentos',type:'incorporadora',contact:'Rodrigo · Tiago',status:'active',projects:'Oceano Home Resort, Casa Nammos, Casa Ferrari, Legend',notes:'Check-in seg e sex',color:'#D8902B'},{id:'core',name:'CORE (interno)',type:'outro',contact:'Rômulo Rocha',status:'active',projects:'Gestão interna',notes:'Blocos empresário',color:'#3A4250'},{id:'avalon',name:'Avalon Construtora',type:'construtora',contact:'—',status:'negotiation',projects:'Cronogramas de obra',notes:'Fluxo sendo definido',color:'#2F7D5B'}]}
function defR(){return[{id:uid(),name:'Post Instagram (@core)',freq:'semanal',day:'segunda',done:false},{id:uid(),name:'Revisão financeira · DRE · Fator R',freq:'semanal',day:'sexta',done:false},{id:uid(),name:'Reunião de planejamento CORE',freq:'semanal',day:'segunda',done:false},{id:uid(),name:'Check-in R. Dimer',freq:'semanal',day:'segunda',done:false},{id:uid(),name:'Check-in R. Dimer (fechamento)',freq:'semanal',day:'sexta',done:false},{id:uid(),name:'Análise de interferências',freq:'diária',day:'',done:false}]}

function uid(){return Math.random().toString(36).slice(2,9)}
function pad(n){return String(n).padStart(2,'0')}
function monday(d){const dt=new Date(d),dy=dt.getDay();dt.setDate(dt.getDate()-dy+(dy===0?-6:1));return dt}
function fiso(d){const dt=new Date(d);return`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`}
function fdmm(d){const dt=new Date(d);return`${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`}
function ffull(d){const dt=new Date(d);return`${pad(dt.getDate())}/${pad(dt.getMonth()+1)}/${dt.getFullYear()}`}
function fwd(d){return['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(d).getDay()]}
function fwdf(d){return['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][new Date(d).getDay()]}
function fmon(d){return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][new Date(d).getMonth()]}
function minsToY(m){return((m-SH*60)/60)*HPX}
function yToTime(y){const nm=Math.round((y/HPX*60+SH*60)/15)*15;const nh=Math.floor(nm/60),nmin=nm%60;return pad(Math.max(SH,Math.min(EH-1,nh)))+':'+pad(nmin)}
function cliById(id){return A.clients.find(c=>c.id===id)||{name:id,color:'#8A95A4'}}
function save(){localStorage.setItem('coreEv',JSON.stringify(A.events));localStorage.setItem('coreTasks',JSON.stringify(A.tasks));localStorage.setItem('coreRot',JSON.stringify(A.routines));localStorage.setItem('coreCli',JSON.stringify(A.clients));localStorage.setItem('coreDone',JSON.stringify(A.done))}

function initFilters(){A.clients.forEach(c=>{if(!(c.id in A.cli))A.cli[c.id]=true});const w=document.getElementById('cliFilters');w.innerHTML='';A.clients.forEach(c=>{const l=document.createElement('label');l.className='cli';l.innerHTML=`<input type="checkbox" ${A.cli[c.id]?'checked':''} onchange="togCli('${c.id}')"><span class="dot" style="background:${c.color}"></span>${c.name}`;w.appendChild(l)})}
function buildSel(id){const s=document.getElementById(id);if(!s)return;s.innerHTML='';A.clients.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;s.appendChild(o)})}

function weekR(mon){
  const evs=[];
  function add(di,h,m,dur,title,cli,notes){const d=new Date(mon);d.setDate(d.getDate()+di);evs.push({id:'rt_'+di+'_'+h+'_'+m+'_'+title.slice(0,8),title,date:fiso(d),time:pad(h)+':'+pad(m),duration:dur,client:cli,type:'work',notes:notes||'',desc:'',isRoutine:true})}
  add(0,8,0,60,'Escritório · e-mail · ClickUp','core','Organização do dia');add(0,9,0,60,'Check-in R. Dimer','dimer','Demandas · ClickUp 4 obras');add(0,10,0,60,'Análise técnica · obra 1','dimer','Oceano Home Resort');add(0,11,0,60,'Análise técnica · obra 2','dimer','Casa Nammos');add(0,13,0,60,'Empresário · fluxo de caixa','core','');add(0,14,0,60,'Prospecção · novos clientes','core','');add(0,15,0,60,'Livre · encaixe','core','');add(0,16,0,60,'Livre · encaixe','core','');add(0,17,0,60,'Livre · incêndio','core','');add(0,18,0,60,'Livre · incêndio','core','');
  add(1,8,0,600,'Vier Engenharia · presencial','vier','Torres → Cricíuma · dia inteiro');
  add(2,8,0,60,'Escritório · e-mail · ClickUp','core','Organização do dia');add(2,9,0,60,'Compilação terça · Vier','vier','Processamento outputs');add(2,10,0,60,'Análise técnica · obra 3','dimer','Casa Ferrari');add(2,11,0,60,'Análise técnica · obra 4','dimer','Legend');add(2,13,0,60,'Financeiro CORE · DRE · Fator R','core','');add(2,14,0,60,'Admin · documentos · escopo','core','');add(2,15,0,60,'Livre · encaixe','core','');add(2,16,0,60,'Livre · encaixe','core','');add(2,17,0,60,'Livre · incêndio','core','');add(2,18,0,60,'Livre · incêndio','core','');
  add(3,8,0,600,'Vier Engenharia · presencial','vier','Torres → Cricíuma · dia inteiro');
  add(4,8,0,60,'Escritório · e-mail · ClickUp','core','Organização do dia');add(4,9,0,60,'Check-in R. Dimer · fechamento','dimer','Fechamento de semana');add(4,10,0,60,'Análise técnica · obras R. Dimer','dimer','Revisão geral 4 obras');add(4,11,0,60,'Compilação quinta · Vier','vier','Processamento outputs');add(4,13,0,60,'Empresário · estratégia CORE','core','');add(4,14,0,60,'Comercial · propostas','core','');add(4,15,0,60,'Livre · encaixe','core','');add(4,16,0,60,'Livre · encaixe','core','');add(4,17,0,60,'Livre · incêndio','core','');add(4,18,0,60,'Livre · incêndio','core','');
  add(5,8,0,60,'Estratégia · crescimento CORE','core','Válvula de segurança');add(5,9,0,60,'Análise profunda · pendências','core','');
  return evs;
}

function expRecur(evs,s,e){const out=[];evs.forEach(ev=>{if(!ev.recur){out.push(ev);return}const base=new Date(ev.date),until=ev.recur.until?new Date(ev.recur.until):e;let cur=new Date(base);while(cur<=until&&cur<=e){if(cur>=s)out.push({...ev,date:fiso(cur),_rid:ev.id});if(ev.recur.freq==='daily')cur.setDate(cur.getDate()+1);else if(ev.recur.freq==='weekly')cur.setDate(cur.getDate()+7);else if(ev.recur.freq==='biweekly')cur.setDate(cur.getDate()+14);else if(ev.recur.freq==='monthly')cur.setMonth(cur.getMonth()+1);else break}});return out}

function go(tab){A.tab=tab;['gantt','tasks','dash','clients','year','routines'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('on',t===tab);document.getElementById('bn-'+t).classList.toggle('on',t===tab)});if(tab==='gantt')rGantt();if(tab==='tasks')rTasks();if(tab==='dash')rDash();if(tab==='clients')rClients();if(tab==='year')rYear();if(tab==='routines')rRoutines()}
function pw(){A.mon.setDate(A.mon.getDate()-7);rGantt()}
function nw(){A.mon.setDate(A.mon.getDate()+7);rGantt()}
function togCli(c){A.cli[c]=!A.cli[c];if(A.tab==='gantt')rGantt()}
function togType(t){A.types[t]=!A.types[t];if(A.tab==='gantt')rGantt()}

// ── GANTT ──
function rGantt(){
  A.zoom=parseInt(document.getElementById('zs').value)||7;
  const vis=Math.min(A.zoom,7);
  const sun=new Date(A.mon);sun.setDate(sun.getDate()+6);
  document.getElementById('wlbl').textContent=`${fdmm(A.mon)} – ${fdmm(sun)}`;
  const grid=document.getElementById('ggrid'),days=document.getElementById('gdays'),tc=document.getElementById('gtc');
  grid.innerHTML='';days.innerHTML='';tc.innerHTML='';
  const dw=100/vis,totH=(EH-SH)*HPX;
  grid.style.height=totH+'px';grid.style.position='relative';
  for(let h=SH;h<=EH;h++){
    const s=document.createElement('div');s.className='tslot'+(h%2===0?' maj':'');s.textContent=pad(h)+':00';tc.appendChild(s);
    const l=document.createElement('div');l.className='hline'+(h%2===0?' maj':'');l.style.cssText=`position:absolute;left:0;right:0;top:${(h-SH)*HPX}px;border-top:1px solid ${h%2===0?'#D7DCE3':'#eeeeee'};pointer-events:none`;grid.appendChild(l);
  }
  const nm=new Date().getHours()*60+new Date().getMinutes();
  if(nm>=SH*60&&nm<=EH*60){const nl=document.createElement('div');nl.className='nowline';nl.style.top=minsToY(nm)+'px';grid.appendChild(nl)}
  const today=fiso(new Date());
  const wS=new Date(A.mon),wE=new Date(A.mon);wE.setDate(wE.getDate()+6);
  const rtEvs=weekR(A.mon),userEvs=expRecur(A.events,wS,wE),conflicts=[];
  for(let i=0;i<vis;i++){
    const d=new Date(A.mon);d.setDate(d.getDate()+i);
    const ds=fiso(d),dow=d.getDay(),isBlk=BLOCKED.includes(dow),isWknd=dow===0||dow===6,isTod=ds===today,pct=i/vis*100;
    const col=document.createElement('div');col.className='gcol'+(isBlk?' blk':isWknd?' wknd':'');col.style.cssText=`left:${pct}%;width:${dw}%;height:${totH}px;position:absolute;top:0`;
    if(isBlk){const b=document.createElement('div');b.className='blbl';b.innerHTML='<span>VIER · CRICÍUMA</span>';col.appendChild(b)}
    grid.appendChild(col);
    const dh=document.createElement('div');dh.className='gdh'+(isTod?' today':'')+(isBlk?' blocked':'');dh.style.cssText=`width:${dw}%;flex-shrink:0`;
    dh.innerHTML=`<div class="dname">${fwd(d)}</div><div class="dnum">${d.getDate()}</div>${isBlk?'<div class="dtag vt">Vier</div>':isWknd?'':'<div class="dtag ft">Torres</div>'}`;
    dh.onclick=()=>{document.getElementById('eD').value=ds;openEvModal()};days.appendChild(dh);
    const dayRt=rtEvs.filter(e=>e.date===ds&&A.cli[e.client]&&A.types.routine);
    const dayUsr=userEvs.filter(e=>e.date===ds&&A.cli[e.client]&&A.types.event&&!e.isRoutine);
    const allEvs=[...dayRt,...dayUsr].sort((a,b)=>{const[ah,am]=a.time.split(':').map(Number);const[bh,bm]=b.time.split(':').map(Number);return(ah*60+am)-(bh*60+bm)});
    const tm={};allEvs.forEach(e=>{if(!tm[e.time])tm[e.time]=[];tm[e.time].push(e)});
    Object.values(tm).forEach(g=>{if(g.length>1)conflicts.push(`${fwd(d)} ${g[0].time}`)});
    allEvs.forEach((e,ei)=>{
      const[eh,em]=e.time.split(':').map(Number);
      const sm=eh*60+em,em2=sm+(e.duration||60),tp=minsToY(sm),hp=Math.max(minsToY(em2)-tp,24);
      const dk=e.id+'_'+ds,isDone=!!A.done[dk];
      const ov=allEvs.filter((o,oi)=>{if(oi===ei)return false;const[oh,om]=o.time.split(':').map(Number);const os=oh*60+om,oe=os+(o.duration||60);return sm<oe&&em2>os});
      const ts=ov.length+1,ms=ov.filter(o=>{const[oh,om]=o.time.split(':').map(Number);return oh*60+om<sm}).length;
      const cw=dw/ts,cl=pct+ms*cw;
      const cli=cliById(e.client);
      const el=document.createElement('div');
      el.className=`gevt ${e.client}-ev${e.isRoutine?' routine-ev':''}${isDone?' done-ev':''}`;
      el.style.cssText=`top:${tp}px;height:${hp}px;left:${cl}%;width:${cw}%;border-left-color:${cli.color}`;
      el.innerHTML=`<div class="etime">${e.time}${e.duration?' · '+e.duration+'m':''}</div><div class="etitle">${e.title}</div>${e.notes&&!e.isRoutine||e.desc?`<div class="esub">${e.desc||e.notes}</div>`:''}<input type="checkbox" class="echk" ${isDone?'checked':''} title="Concluído">`;
      el.querySelector('.echk').onchange=ev2=>{ev2.stopPropagation();A.done[dk]=ev2.target.checked;save();rGantt()};
      // Tooltip
      el.addEventListener('mouseenter',ev2=>{const t=document.getElementById('tt');document.getElementById('ttt').textContent=`${fwdf(d)} · ${e.time}`;document.getElementById('ttl').textContent=e.title;document.getElementById('tts').textContent=e.desc||e.notes||cli.name;t.classList.add('show');posTT(ev2)});
      el.addEventListener('mousemove',posTT);el.addEventListener('mouseleave',()=>document.getElementById('tt').classList.remove('show'));
      if(e.isRoutine){
        // Rotinas: só duplo clique para criar evento no horário desejado
        let lastTap2=0;
        el.addEventListener('pointerup',function(ev2){
          if(ev2.target.type==='checkbox')return;
          const now=Date.now();
          if(now-lastTap2<400){ openEvModal(null,e); }
          else{ lastTap2=now; }
        });
      } else {
        // Eventos manuais: drag + duplo clique para editar
        makeDrag(el,e,tp,totH,ds);
      }
      grid.appendChild(el);
    });
  }
  const cb=document.getElementById('cbar');
  if(conflicts.length){cb.classList.add('show');cb.textContent=`Conflito: ${conflicts.slice(0,3).join(', ')}.`}else cb.classList.remove('show');
}

function posTT(ev){const t=document.getElementById('tt');let x=ev.clientX+14,y=ev.clientY-10;if(x+210>window.innerWidth)x=ev.clientX-210;if(y+80>window.innerHeight)y=ev.clientY-80;t.style.left=x+'px';t.style.top=y+'px'}

// DRAG — somente eventos manuais (rotinas usam duplo clique)
function makeDrag(el, ev, origTop, totH, ds){
  let pid=null, sy=0, st=0, moved=false, lastTap=0;
  el.addEventListener('pointerdown', function(e){
    if(e.target.type==='checkbox') return;
    pid=e.pointerId; sy=e.clientY; st=parseFloat(el.style.top)||origTop; moved=false;
    el.setPointerCapture(pid);
    document.getElementById('tt').classList.remove('show');
  });
  el.addEventListener('pointermove', function(e){
    if(e.pointerId!==pid) return;
    const dy=e.clientY-sy;
    if(Math.abs(dy)>8){ moved=true; el.classList.add('dragging'); el.style.top=Math.max(0,Math.min(totH-24,st+dy))+'px'; }
  });
  el.addEventListener('pointerup', function(e){
    if(e.pointerId!==pid) return;
    pid=null; el.classList.remove('dragging');
    if(moved){
      moved=false;
      const nt=yToTime(parseFloat(el.style.top));
      const idx=A.events.findIndex(x=>x.id===ev.id||(ev._rid&&x.id===ev._rid));
      if(idx>-1){ A.events[idx].time=nt; save(); }
      rGantt(); return;
    }
    const now=Date.now();
    if(now-lastTap<400){ openEvModal(ev.id); }
    else{ lastTap=now; }
  });
  el.addEventListener('pointercancel', function(){ pid=null; moved=false; el.classList.remove('dragging'); });
}

function delCli(id){const c=A.clients.find(x=>x.id===id);if(c&&confirm(`Remover "${c.name}"?`)){A.clients=A.clients.filter(x=>x.id!==id);save();rClients();initFilters();buildSel('eCli');buildSel('tCli')}}

// ── YEAR ──
function rYear(){const g=document.getElementById('ycal');g.innerHTML='';const ts=fiso(new Date());const td=new Set(A.tasks.filter(t=>!t.done&&t.due).map(t=>t.due));for(let m=5;m<17;m++){const yr=m<12?2026:2027,mo=m<12?m:m-12;const card=document.createElement('div');card.className='mcrd';const h=document.createElement('div');h.className='mhdr';h.textContent=`${fmon(new Date(yr,mo,1))} ${yr}`;card.appendChild(h);const gd=document.createElement('div');gd.className='mgrid';['D','S','T','Q','Q','S','S'].forEach(d=>{const l=document.createElement('div');l.className='wdl';l.textContent=d;gd.appendChild(l)});const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);const st=new Date(first);st.setDate(st.getDate()-first.getDay());let cur=new Date(st);while(cur<=last||cur.getDay()!==0){const ds=fiso(cur);const hasEv=A.events.some(e=>e.date===ds&&!e._taskId);const hasTk=td.has(ds);const isBlk=BLOCKED.includes(cur.getDay())&&cur.getMonth()===mo;const el=document.createElement('div');el.className='cd'+(cur.getMonth()!==mo?' other':'')+(hasTk?' hastask':hasEv?' hasev':'')+(isBlk?' blkd':'')+(ds===ts?' today':'');el.textContent=cur.getDate();el.onclick=()=>{document.getElementById('eD').value=ds;openEvModal()};gd.appendChild(el);cur.setDate(cur.getDate()+1)}card.appendChild(gd);g.appendChild(card)}}

// ── ROUTINES ──
function rRoutines(){const l=document.getElementById('rlist');l.innerHTML='';A.routines.forEach(r=>{const c=document.createElement('div');c.className='rcrd'+(r.done?' done':'');c.innerHTML=`<div style="flex:1"><div class="rn">${r.name}</div><div class="rm">${r.freq}${r.day?' · '+r.day:''}</div></div><input type="checkbox" ${r.done?'checked':''} style="accent-color:var(--b600);width:15px;height:15px;cursor:pointer" onchange="doneR('${r.id}')">`;l.appendChild(c)})}
function doneR(id){const r=A.routines.find(x=>x.id===id);if(r){r.done=!r.done;save();rRoutines()}}
function addRoutine(){const name=prompt('Nome da rotina:');if(!name)return;const freq=prompt('Frequência:','semanal')||'semanal';const day=prompt('Dia (vazio se diária):','')||'';A.routines.push({id:uid(),name,freq,day,done:false});save();rRoutines()}

// MODALS
['evModal','taskModal','cliModal'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('open')})});
document.getElementById('eT').addEventListener('keydown',e=>{if(e.key==='Enter')saveEv()});
document.getElementById('tTitle').addEventListener('keydown',e=>{if(e.key==='Enter')saveTask()});
document.getElementById('zs').addEventListener('input',()=>{if(A.tab==='gantt')rGantt()});

function exportJSON(){const blob=new Blob([JSON.stringify({events:A.events,tasks:A.tasks,routines:A.routines,clients:A.clients},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='CORE-agenda.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}

// INIT
document.getElementById('hdate').textContent=ffull(new Date());
initFilters();buildSel('eCli');buildSel('tCli');rGantt();
</script>
</body>
</html>
