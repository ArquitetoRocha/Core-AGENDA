<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE · Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --ink:#0E1116;--ink800:#161A21;--ink700:#232830;
  --g600:#3A4250;--g500:#5C6675;--g400:#8A95A4;
  --m300:#B7BFCB;--m200:#D7DCE3;--m100:#ECEFF3;--bone:#F5F6F8;--white:#FFFFFF;
  --b900:#0B2746;--b800:#11365F;--b700:#174876;--b600:#1E5A91;--b500:#2C72AE;--b200:#B7D2E6;--b100:#E1ECF5;
  --a700:#8C5A14;--a600:#B7771E;--a500:#D8902B;--a200:#F2D9A6;--a100:#FBF1DE;
  --s600:#2F7D5B;--s100:#E1F0E8;
  --d600:#B5392E;--d100:#F8E2DF;
  --fd:'Space Grotesk',system-ui;--fs:'Inter',system-ui;--fm:'JetBrains Mono',monospace;
  --r4:4px;--r6:6px;--r10:10px;--r14:14px;
  --sh1:0 1px 0 rgba(14,17,22,.04),0 1px 2px rgba(14,17,22,.06);
  --sh2:0 1px 2px rgba(14,17,22,.05),0 4px 12px -2px rgba(14,17,22,.08);
  --sh3:0 2px 4px rgba(14,17,22,.06),0 12px 24px -6px rgba(14,17,22,.10);
  --ease:cubic-bezier(.2,0,.2,1);--ease-em:cubic-bezier(.2,0,0,1);
}
html,body{font-family:var(--fs);background:var(--bone);color:var(--ink);height:100vh;overflow:hidden}
#neuralCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.06}
body{display:grid;grid-template-rows:56px 1fr;position:relative}

/* HEADER */
header{
  background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--m200);padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:relative;z-index:50;box-shadow:var(--sh1);
}
.brand{display:flex;align-items:center;gap:9px}
.brand-mark{width:28px;height:28px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center}
.brand-mark svg{width:16px;height:16px}
.brand-name{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.02em}
.brand-name em{color:var(--g500);font-weight:400;font-style:normal}
.header-center{display:flex;align-items:center;gap:10px}
.week-nav{display:flex;align-items:center;gap:5px}
.week-nav button{width:26px;height:26px;border:1px solid var(--m200);background:var(--white);border-radius:var(--r6);cursor:pointer;font-size:14px;color:var(--g600);display:flex;align-items:center;justify-content:center;transition:all 120ms var(--ease)}
.week-nav button:hover{background:var(--m100);color:var(--ink)}
.week-label{font-family:var(--fm);font-size:11px;color:var(--g500);min-width:110px;text-align:center}
.zoom-wrap{display:flex;align-items:center;gap:6px;background:var(--m100);border:1px solid var(--m200);border-radius:var(--r10);padding:3px 10px}
.zoom-lbl{font-family:var(--fm);font-size:9px;color:var(--g400)}
#zoomSlider{width:72px;accent-color:var(--b600);cursor:pointer}
.header-right{display:flex;align-items:center;gap:8px}
.hdate{font-family:var(--fm);font-size:11px;color:var(--g400)}
.nbtn-hdr{
  padding:6px 13px;border:none;border-radius:var(--r6);font-family:var(--fs);font-size:12px;font-weight:500;
  cursor:pointer;transition:all 120ms var(--ease);display:inline-flex;align-items:center;gap:5px;position:relative;
}
.nbtn-hdr::before{content:'';position:absolute;left:9px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5}
.nbtn-hdr.p{background:var(--b600);color:#fff;padding-left:20px}.nbtn-hdr.p:hover{background:var(--b700)}
.nbtn-hdr.s{background:var(--m100);color:var(--ink);border:1px solid var(--m200);padding-left:20px}.nbtn-hdr.s:hover{background:var(--m200)}

/* LAYOUT */
main{display:grid;grid-template-columns:196px 1fr;overflow:hidden;position:relative;z-index:1}
aside{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-right:1px solid var(--m200);padding:14px 11px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.slbl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--g400);margin-bottom:5px}
.nav{display:flex;flex-direction:column;gap:2px}
.snbtn{padding:7px 9px;background:transparent;border:1px solid transparent;border-radius:var(--r6);font-size:12px;font-weight:500;color:var(--g600);cursor:pointer;transition:all 120ms var(--ease);text-align:left;width:100%;display:flex;align-items:center;gap:6px}
.snbtn:hover{background:var(--m100);color:var(--ink)}
.snbtn.on{background:var(--b100);color:var(--b600);border-color:var(--b200);font-weight:600}
.snbtn .nd{width:14px;height:14px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snbtn .nd::after{content:'';width:4px;height:4px;border-radius:50%;background:currentColor}
.cli-list{display:flex;flex-direction:column;gap:3px}
.cli{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:var(--r6);cursor:pointer;font-size:11px;color:var(--g600);transition:all 100ms}
.cli:hover{background:var(--m100)}
.cli input{accent-color:var(--b600);width:12px;height:12px;cursor:pointer}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sdiv{height:1px;background:var(--m200)}
.sinfo{font-size:11px;color:var(--g600);line-height:1.8}
.sinfo code{font-family:var(--fm);font-size:10px;background:var(--m100);padding:1px 5px;border-radius:3px;color:var(--g500)}

/* CONTENT */
.content{overflow:hidden;display:flex;flex-direction:column}
.tab{display:none;flex:1;overflow:hidden}.tab.on{display:flex;flex-direction:column}

/* ── GANTT ── */
.gantt-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.conflict-bar{padding:6px 16px;background:var(--d100);border-bottom:1px solid rgba(181,57,46,.2);font-size:11px;color:var(--d600);display:flex;align-items:center;gap:6px}
.conflict-bar::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--d600);flex-shrink:0}
.gantt-head{display:flex;background:var(--white);border-bottom:1px solid var(--m200);box-shadow:var(--sh1);position:relative;z-index:10;flex-shrink:0}
.g-corner{width:64px;flex-shrink:0;border-right:1px solid var(--m200);padding:8px;display:flex;align-items:flex-end;font-family:var(--fm);font-size:9px;color:var(--g400)}
.g-days{display:flex;flex:1;overflow:hidden}
.g-day-hdr{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border-right:1px solid var(--m100);cursor:pointer;transition:background 120ms;min-width:0;flex:1}
.g-day-hdr:hover{background:var(--bone)}
.g-day-hdr.today{background:var(--b100)}
.g-day-hdr.blocked{background:rgba(30,90,145,.05)}
.d-name{font-family:var(--fd);font-size:10px;font-weight:600;color:var(--g600)}
.d-num{font-family:var(--fm);font-size:17px;font-weight:500;color:var(--ink);line-height:1.1}
.d-tag{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.d-tag.vt{color:var(--b600)}.d-tag.ft{color:var(--s600)}
.gantt-body{flex:1;overflow:auto;display:flex;position:relative}
.g-time-col{width:64px;flex-shrink:0;border-right:1px solid var(--m200);background:var(--white);position:sticky;left:0;z-index:5}
.t-slot{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 8px 0 0;border-bottom:1px solid var(--m100);font-family:var(--fm);font-size:9px;color:var(--g400)}
.t-slot.maj{border-bottom-color:var(--m200)}
.g-grid{flex:1;position:relative}
.g-col{position:absolute;top:0;bottom:0;border-right:1px solid var(--m100);transition:left .24s var(--ease),width .24s var(--ease)}
.g-col.blk{background:repeating-linear-gradient(-45deg,transparent,transparent 7px,rgba(30,90,145,.025) 7px,rgba(30,90,145,.025) 14px)}
.g-col.wknd{background:rgba(216,144,43,.025)}
.h-line{position:absolute;left:0;right:0;border-top:1px solid var(--m100);pointer-events:none}
.h-line.maj{border-top-color:var(--m200)}
.now-line{position:absolute;left:0;right:0;border-top:2px solid var(--d600);pointer-events:none;z-index:8;opacity:.65}
.now-line::before{content:'';position:absolute;left:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--d600)}

/* EVENTS */
.g-evt{
  position:absolute;border-radius:0;padding:3px 7px;cursor:pointer;
  transition:box-shadow 120ms var(--ease),transform 120ms var(--ease),opacity 120ms;
  border-left:2px solid transparent;user-select:none;overflow:hidden;min-height:20px;
}
.g-evt:hover{box-shadow:var(--sh2);z-index:20}
.g-evt.dragging{opacity:.8;box-shadow:var(--sh3);z-index:100;cursor:grabbing}
.g-evt.done-ev{opacity:.5}
.g-evt.done-ev .ev-title{text-decoration:line-through}
.g-evt .ev-time{font-family:var(--fm);font-size:9px;opacity:.7;white-space:nowrap}
.g-evt .ev-title{font-size:10px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-evt .ev-sub{font-size:9px;opacity:.65;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-evt .ev-check{position:absolute;top:3px;right:4px;width:13px;height:13px;cursor:pointer;accent-color:var(--s600);z-index:5}
.vier-ev{background:var(--b100);color:var(--b800);border-left-color:var(--b600)}
.dimer-ev{background:var(--a100);color:var(--a700);border-left-color:var(--a500)}
.core-ev{background:var(--m100);color:var(--g600);border-left-color:var(--g500)}
.avalon-ev{background:var(--s100);color:var(--s600);border-left-color:var(--s600)}
.routine-ev{opacity:.75}
.blocked-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.blocked-lbl span{font-family:var(--fd);font-size:9px;font-weight:700;color:var(--b600);letter-spacing:.1em;text-transform:uppercase;opacity:.4;writing-mode:vertical-rl;transform:rotate(180deg)}

/* TOOLTIP */
.tooltip{position:fixed;background:var(--ink);color:var(--white);border-radius:var(--r10);padding:9px 12px;font-size:11px;pointer-events:none;z-index:300;box-shadow:var(--sh3);max-width:200px;opacity:0;transition:opacity 100ms var(--ease)}
.tooltip.show{opacity:1}
.tt-time{font-family:var(--fm);font-size:9px;color:var(--g400);margin-bottom:3px}
.tt-title{font-weight:600;margin-bottom:2px;font-size:12px}
.tt-sub{font-size:10px;color:var(--g400)}

/* ── DASHBOARD ── */
.dash-wrap{flex:1;overflow-y:auto;padding:20px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--white);border:1px solid var(--m200);border-radius:var(--r10);padding:14px 16px;box-shadow:var(--sh1)}
.kpi-label{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--g500);margin-bottom:8px}
.kpi-value{font-family:var(--fm);font-size:26px;font-weight:500;color:var(--ink);line-height:1}
.kpi-sub{font-size:11px;color:var(--g500);margin-top:4px}
.kpi-value.pos{color:var(--s600)}.kpi-value.warn{color:var(--a600)}
.bar-chart{background:var(--white);border:1px solid var(--m200);border-radius:var(--r10);padding:16px;box-shadow:var(--sh1);margin-bottom:12px}
.bar-chart h4{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--ink);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:11px;color:var(--g600);width:100px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--m100);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;transition:width .4s var(--ease-em)}
.bar-val{font-family:var(--fm);font-size:10px;color:var(--g500);width:36px;text-align:right;flex-shrink:0}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.streak-card{background:var(--white);border:1px solid var(--m200);border-radius:var(--r10);padding:14px 16px;box-shadow:var(--sh1)}
.streak-num{font-family:var(--fm);font-size:36px;font-weight:500;color:var(--b600)}
.routine-dash{background:var(--white);border:1px solid var(--m200);border-radius:var(--r10);padding:14px 16px;box-shadow:var(--sh1)}
.r-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--m100);font-size:12px}
.r-row:last-child{border-bottom:none}

/* ── CLIENTS ── */
.clients-wrap{flex:1;overflow-y:auto;padding:20px}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:0}
.client-card{background:var(--white);border:1px solid var(--m200);border-radius:var(--r10);padding:16px;box-shadow:var(--sh1);position:relative}
.client-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.client-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.client-name{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--ink)}
.client-type{font-size:11px;color:var(--g500)}
.client-status{position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.st-active{background:var(--s100);color:var(--s600)}
.st-neg{background:var(--a100);color:var(--a700)}
.st-inactive{background:var(--m100);color:var(--g500)}
.client-info{font-size:11px;color:var(--g600);line-height:1.8}
.client-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--m200)}
.ca-btn{padding:5px 10px;border:1px solid var(--m200);background:transparent;border-radius:var(--r6);font-size:11px;color:var(--g600);cursor:pointer;transition:all 100ms}
.ca-btn:hover{background:var(--m100)}

/* ── YEAR ── */
.ycal{display:grid;grid-template-columns:repeat(auto-fit,minmax(196px,1fr));gap:12px;padding:16px;overflow-y:auto;flex:1}
.mcrd{background:var(--white);border:1px solid var(--m200);border-radius:var(--r10);overflow:hidden;box-shadow:var(--sh1)}
.mhdr{background:var(--m100);padding:7px 11px;font-family:var(--fd);font-size:11px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--m200)}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:7px}
.wdl{text-align:center;font-size:8px;color:var(--g500);padding:2px 0;font-weight:600;text-transform:uppercase}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:3px;color:var(--g600);cursor:pointer;transition:all 100ms}
.cd:hover{background:var(--m100)}
.cd.other{color:var(--m300)}
.cd.hasev{background:var(--b100);color:var(--b700);font-weight:600}
.cd.today{background:var(--b600);color:#fff;font-weight:600}
.cd.blkd{background:rgba(30,90,145,.07);color:var(--b600)}

/* ── ROUTINES ── */
.routines-wrap{padding:20px;overflow-y:auto;flex:1}
.rlist{display:flex;flex-direction:column;gap:7px;max-width:540px}
.rcrd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--white);border:1px solid var(--m200);border-radius:var(--r10);transition:all 120ms;box-shadow:var(--sh1)}
.rcrd:hover{background:var(--bone)}
.rcrd.done .rn{text-decoration:line-through;color:var(--g400)}
.rn{font-weight:500;font-size:13px;color:var(--ink)}
.rm{font-size:11px;color:var(--g500);margin-top:2px}
.rcrd input[type=checkbox]{accent-color:var(--b600);width:15px;height:15px;cursor:pointer}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(14,17,22,.5);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 180ms var(--ease)}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-box{background:var(--white);border-radius:var(--r14);padding:22px;max-width:460px;width:92%;box-shadow:var(--sh3);transform:translateY(10px);transition:transform 180ms var(--ease-em);border:1px solid var(--m200)}
.modal-bg.open .modal-box{transform:translateY(0)}
.modal-box.wide{max-width:520px}
.mttl{font-family:var(--fd);font-size:17px;font-weight:600;margin:0 0 18px;color:var(--ink)}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g600)}
.fi,.fsel{padding:8px 11px;border:1px solid var(--m200);border-radius:var(--r6);font-family:var(--fs);font-size:13px;color:var(--ink);background:var(--white);width:100%;transition:all 120ms}
.fi:focus,.fsel:focus{outline:0;border-color:var(--b600);box-shadow:0 0 0 3px rgba(30,90,145,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mbtns button{padding:8px 15px;border:none;border-radius:var(--r6);font-family:var(--fs);font-size:12px;font-weight:600;cursor:pointer;transition:all 120ms}
.mbtns .cancel{background:var(--m100);color:var(--ink);border:1px solid var(--m200)}.mbtns .cancel:hover{background:var(--m200)}
.mbtns .save{background:var(--b600);color:#fff}.mbtns .save:hover{background:var(--b700)}
.recur-sec{background:var(--bone);border:1px solid var(--m200);border-radius:var(--r6);padding:10px 12px;margin-bottom:12px}
.recur-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--g600)}
.recur-toggle input{accent-color:var(--b600)}
.recur-opts{margin-top:10px;display:none;flex-direction:column;gap:8px}
.recur-opts.show{display:flex}
.color-picker{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 120ms}
.color-opt.sel{border-color:var(--ink);transform:scale(1.15)}
</style>
</head>
<body>
<canvas id="neuralCanvas"></canvas>

<header>
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="2" fill="#D8902B"/>
        <circle cx="2" cy="4" r="1.2" fill="white" opacity=".7"/>
        <circle cx="14" cy="4" r="1.2" fill="white" opacity=".7"/>
        <circle cx="2" cy="12" r="1.2" fill="white" opacity=".7"/>
        <circle cx="14" cy="12" r="1.2" fill="white" opacity=".7"/>
        <line x1="3.2" y1="4" x2="6" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
        <line x1="12.8" y1="4" x2="10" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
        <line x1="3.2" y1="12" x2="6" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
        <line x1="12.8" y1="12" x2="10" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
      </svg>
    </div>
    <div class="brand-name">CORE <em>· agenda</em></div>
  </div>
  <div class="header-center">
    <div class="week-nav">
      <button onclick="pw()">‹</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="nw()">›</button>
    </div>
    <div class="zoom-wrap">
      <span class="zoom-lbl">semana</span>
      <input type="range" id="zoomSlider" min="1" max="7" value="7" step="1">
      <span class="zoom-lbl">dia</span>
    </div>
  </div>
  <div class="header-right">
    <span class="hdate" id="hdate"></span>
    <button class="nbtn-hdr s" onclick="exportJSON()">↓ exportar</button>
    <button class="nbtn-hdr p" onclick="openEvModal()">+ evento</button>
  </div>
</header>

<main>
<aside>
  <div>

// ── NEURAL CANVAS ──
(function(){
  const c=document.getElementById('neuralCanvas'),ctx=c.getContext('2d');
  let nodes=[],W,H;
  const N=24,D=150;
  function resize(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    nodes=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.5+.8}));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<D){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.strokeStyle=`rgba(30,90,145,${.7*(1-d/D)})`;ctx.lineWidth=.6;ctx.stroke()}
    }
    nodes.forEach(n=>{
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle='rgba(30,90,145,.45)';ctx.fill();
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();

// ── EXPAND RECURRING ──
function expandRecur(evs,s,e){
  const out=[];
  evs.forEach(ev=>{
    if(!ev.recur){out.push(ev);return}
    const base=new Date(ev.date),until=ev.recur.until?new Date(ev.recur.until):e;
    let cur=new Date(base);
    while(cur<=until&&cur<=e){
      if(cur>=s) out.push({...ev,date:fiso(cur),_rid:ev.id});
      if(ev.recur.freq==='daily')cur.setDate(cur.getDate()+1);
      else if(ev.recur.freq==='weekly')cur.setDate(cur.getDate()+7);
      else if(ev.recur.freq==='biweekly')cur.setDate(cur.getDate()+14);
      else if(ev.recur.freq==='monthly')cur.setMonth(cur.getMonth()+1);
      else break;
    }
  });
  return out;
}

// ── GANTT ──
function renderGantt(){
  A.zoom=parseInt(document.getElementById('zoomSlider').value)||7;
  const vis=Math.min(A.zoom,7);
  const sun=new Date(A.mon);sun.setDate(sun.getDate()+6);
  document.getElementById('weekLabel').textContent=`${fdmm(A.mon)} – ${fdmm(sun)}`;

  const grid=document.getElementById('ganttGrid');
  const days=document.getElementById('ganttDays');
  const tc=document.getElementById('ganttTimeCol');
  grid.innerHTML='';days.innerHTML='';tc.innerHTML='';

  const dw=100/vis;
  const totH=(EH-SH)*HPX;
  grid.style.height=totH+'px';grid.style.position='relative';

  // time col + h-lines
  for(let h=SH;h<=EH;h++){
    const s=document.createElement('div');s.className='t-slot'+(h%2===0?' maj':'');s.textContent=pad(h)+':00';tc.appendChild(s);
    const l=document.createElement('div');l.className='h-line'+(h%2===0?' maj':'');l.style.top=((h-SH)*HPX)+'px';grid.appendChild(l);
  }
  // now line
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  if(nm>=SH*60&&nm<=EH*60){
    const nl=document.createElement('div');nl.className='now-line';nl.style.top=minsToY(nm)+'px';grid.appendChild(nl);
  }

  const todayStr=fiso(new Date());
  const wStart=new Date(A.mon),wEnd=new Date(A.mon);wEnd.setDate(wEnd.getDate()+6);
  const rtEvs=weekRoutine(A.mon);
  const userEvs=expandRecur(A.events,wStart,wEnd);
  const conflicts=[];

  for(let i=0;i<vis;i++){
    const d=new Date(A.mon);d.setDate(d.getDate()+i);
    const ds=fiso(d),dow=d.getDay();
    const isBlk=BLOCKED.includes(dow),isWknd=dow===0||dow===6,isToday=ds===todayStr;
    const pct=i/vis*100;

    // col bg
    const col=document.createElement('div');
    col.className='g-col'+(isBlk?' blk':isWknd?' wknd':'');
    col.style.cssText=`left:${pct}%;width:${dw}%;height:${totH}px`;
    if(isBlk){const lbl=document.createElement('div');lbl.className='blocked-lbl';lbl.innerHTML='<span>VIER · CRICÍUMA</span>';col.appendChild(lbl)}
    grid.appendChild(col);

    // day header
    const dh=document.createElement('div');
    dh.className='g-day-hdr'+(isToday?' today':'')+(isBlk?' blocked':'');
    dh.style.cssText=`width:${dw}%;flex-shrink:0`;
    dh.innerHTML=`<div class="d-name">${fwd(d)}</div><div class="d-num">${d.getDate()}</div>${isBlk?'<div class="d-tag vt">Vier</div>':isWknd?'':'<div class="d-tag ft">Torres</div>'}`;
    dh.onclick=()=>{document.getElementById('eD').value=ds;openEvModal()};
    days.appendChild(dh);

    // events
    const dayRt=rtEvs.filter(e=>e.date===ds&&A.cli[e.client]&&A.types.routine);
    const dayUsr=userEvs.filter(e=>e.date===ds&&A.cli[e.client]&&A.types.event&&!e.isRoutine);
    const allEvs=[...dayRt,...dayUsr];

    // conflict detect
    const tm={};
    allEvs.forEach(e=>{if(!tm[e.time])tm[e.time]=[];tm[e.time].push(e)});
    Object.values(tm).forEach(g=>{if(g.length>1)conflicts.push(`${fwd(d)} ${g[0].time}`)});

    allEvs.forEach((e,ei)=>{
      const[eh,em]=e.time.split(':').map(Number);
      const sm=eh*60+em,em2=sm+(e.duration||60);
      const tp=minsToY(sm),hp=Math.max(minsToY(em2)-tp,20);
      const doneKey=e.id+'_'+ds;
      const isDone=!!A.done[doneKey];

      // overlap
      const ov=allEvs.filter((o,oi)=>{
        if(oi===ei)return false;
        const[oh,om]=o.time.split(':').map(Number);
        const os=oh*60+om,oe=os+(o.duration||60);
        return sm<oe&&em2>os;
      });
      const ts=ov.length+1;
      const ms=ov.filter(o=>{const[oh,om]=o.time.split(':').map(Number);return oh*60+om<sm}).length;
      const cw=dw/ts,cl=pct+ms*cw;

      const cli=cliById(e.client);
      const evEl=document.createElement('div');
      evEl.className=`g-evt ${e.client}-ev${e.isRoutine?' routine-ev':''}${isDone?' done-ev':''}`;
      // Use client color for border
      evEl.style.cssText=`top:${tp}px;height:${hp}px;left:${cl}%;width:${cw}%;border-left-color:${cli.color}`;
      evEl.innerHTML=`
        <div class="ev-time">${e.time}${e.duration?' · '+e.duration+'m':''}</div>
        <div class="ev-title">${e.title}</div>
        ${e.notes?`<div class="ev-sub">${e.notes}</div>`:''}
        <input type="checkbox" class="ev-check" ${isDone?'checked':''} title="Marcar como concluído">
      `;

      // Check = mark done
      evEl.querySelector('.ev-check').onchange=(ev2)=>{
        ev2.stopPropagation();
        A.done[doneKey]=ev2.target.checked;
        save();renderGantt();
      };

      // Tooltip
      evEl.addEventListener('mouseenter',ev2=>{
        const tt=document.getElementById('tooltip');
        document.getElementById('tt-time').textContent=`${fwdf(d)} · ${e.time}`;
        document.getElementById('tt-title').textContent=e.title;
        document.getElementById('tt-sub').textContent=e.notes||cli.name;
        tt.classList.add('show');posTT(ev2);
      });
      evEl.addEventListener('mousemove',posTT);
      evEl.addEventListener('mouseleave',()=>document.getElementById('tooltip').classList.remove('show'));

      // Delete user events on dblclick
      if(!e.isRoutine){
        evEl.ondblclick=ev2=>{
          ev2.stopPropagation();
          if(confirm(`Deletar "${e.title}"?`)){
            A.events=A.events.filter(x=>x.id!==e.id&&x.id!==e._rid);
            save();renderGantt();
          }
        };
        makeDrag(evEl,e);
      }
      grid.appendChild(evEl);
    });
  }

  const cb=document.getElementById('conflictBar');
  if(conflicts.length){cb.style.display='flex';cb.textContent=`Conflito: ${conflicts.slice(0,3).join(', ')}${conflicts.length>3?' +'+( conflicts.length-3):''}. Verifique os horários.`}
  else cb.style.display='none';
}

function posTT(ev){
  const tt=document.getElementById('tooltip');
  let x=ev.clientX+14,y=ev.clientY-10;
  if(x+210>window.innerWidth)x=ev.clientX-210;
  if(y+80>window.innerHeight)y=ev.clientY-80;
  tt.style.left=x+'px';tt.style.top=y+'px';
}

// ── DRAG (vertical, snap 15min) ──
function makeDrag(el,ev){
  let sy,st,drag=false;
  el.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target.type==='checkbox')return;
    sy=e.clientY;st=parseFloat(el.style.top);e.preventDefault();
    const mm=e2=>{
      if(!drag&&Math.abs(e2.clientY-sy)>5){drag=true;el.classList.add('dragging');document.getElementById('tooltip').classList.remove('show')}
      if(drag)el.style.top=Math.max(0,st+(e2.clientY-sy))+'px';
    };
    const mu=()=>{
      document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
      if(!drag)return;drag=false;el.classList.remove('dragging');
      const newTop=parseFloat(el.style.top);
      const nm=Math.round((newTop/HPX*60+SH*60)/15)*15;
      const nh=Math.floor(nm/60),nmin=nm%60;
      const nt=pad(Math.max(SH,Math.min(EH-1,nh)))+':'+pad(nmin);
      const idx=A.events.findIndex(x=>x.id===ev.id);
      if(idx>-1){A.events[idx].time=nt;save()}
      renderGantt();
    };
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

// ── DASHBOARD ──
function renderDash(){
  const wrap=document.getElementById('dashWrap');wrap.innerHTML='';
  const wStart=new Date(A.mon),wEnd=new Date(A.mon);wEnd.setDate(wEnd.getDate()+6);
  const rtEvs=weekRoutine(A.mon);
  const userEvs=expandRecur(A.events,wStart,wEnd);
  const allEvs=[...rtEvs,...userEvs];

  // Hours per client
  const hpc={};A.clients.forEach(c=>{hpc[c.id]=0});
  allEvs.forEach(e=>{if(e.client in hpc)hpc[e.client]+=(e.duration||60)/60});
  const totalH=Object.values(hpc).reduce((a,b)=>a+b,0)||1;

  // Done stats
  const wStartStr=fiso(wStart),wEndStr=fiso(wEnd);
  const doneEvs=allEvs.filter(e=>{
    const k=e.id+'_'+e.date;
    return A.done[k]&&e.date>=wStartStr&&e.date<=wEndStr;
  });
  const pctDone=allEvs.length?Math.round(doneEvs.length/allEvs.length*100):0;

  // Routines done
  const rtDone=A.routines.filter(r=>r.done).length;
  const rtTotal=A.routines.length;
  const rtPct=rtTotal?Math.round(rtDone/rtTotal*100):0;

  // Streak (days with at least 1 done)
  let streak=0;
  const today=new Date();
  for(let i=0;i<30;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=fiso(d);
    const dayDone=Object.keys(A.done).some(k=>k.endsWith('_'+ds)&&A.done[k]);
    if(dayDone)streak++;else break;
  }

  // Free slots this week (15-18 seg/qua/sex = 3 days x 4h = 12 slots of 1h)
  const freeTotal=12;
  const freeUsed=userEvs.filter(e=>{
    const[h]=e.time.split(':').map(Number);return h>=15&&h<19&&!e.isRoutine;
  }).length;

  // KPI cards
  const kpis=[
    {label:'Horas planejadas · semana',value:Math.round(totalH)+'h',sub:'total de blocos na semana'},
    {label:'Atividades concluídas',value:pctDone+'%',sub:`${doneEvs.length} de ${allEvs.length} marcadas`,cls:pctDone>=70?'pos':'warn'},
    {label:'Rotinas executadas',value:rtPct+'%',sub:`${rtDone} de ${rtTotal} rotinas`,cls:rtPct>=80?'pos':'warn'},
    {label:'Slots livres restantes',value:(freeTotal-freeUsed)+'h',sub:'tarde 15h–19h · seg/qua/sex'},
  ];

  const kGrid=document.createElement('div');kGrid.className='dash-grid';
  kpis.forEach(k=>{
    const card=document.createElement('div');card.className='kpi-card';
    card.innerHTML=`<div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls||''}">${k.value}</div><div class="kpi-sub">${k.sub}</div>`;
    kGrid.appendChild(card);
  });
  wrap.appendChild(kGrid);

  // Bar chart — time by client
  const bar=document.createElement('div');bar.className='bar-chart';
  bar.innerHTML='<h4>Distribuição de tempo por cliente · semana atual</h4>';
  A.clients.forEach(c=>{
    const h=hpc[c.id]||0;
    const pct=Math.round(h/totalH*100);
    const row=document.createElement('div');row.className='bar-row';
    row.innerHTML=`
      <div class="bar-label">${c.name.split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      <div class="bar-val">${Math.round(h)}h</div>
    `;
    bar.appendChild(row);
  });
  wrap.appendChild(bar);

  // Bottom row
  const drow=document.createElement('div');drow.className='dash-row';

  // Streak
  const sc=document.createElement('div');sc.className='streak-card';
  sc.innerHTML=`<div class="kpi-label">Streak de execução</div><div class="streak-num">${streak}</div><div class="kpi-sub">dias consecutivos com atividade</div>`;
  drow.appendChild(sc);

  // Routines list
  const rl=document.createElement('div');rl.className='routine-dash';
  rl.innerHTML='<div class="kpi-label" style="margin-bottom:10px">Rotinas da semana</div>';
  A.routines.slice(0,6).forEach(r=>{
    const row=document.createElement('div');row.className='r-row';
    row.innerHTML=`<span>${r.name}</span><span style="font-family:var(--fm);font-size:10px;color:${r.done?'var(--s600)':'var(--g400)'}">${r.done?'✓ feito':'pendente'}</span>`;
    rl.appendChild(row);
  });
  drow.appendChild(rl);
  wrap.appendChild(drow);
}

// ── CLIENTS ──
function renderClients(){
  initFilters();
  const grid=document.getElementById('clientsGrid');grid.innerHTML='';
  A.clients.forEach(c=>{
    const card=document.createElement('div');card.className='client-card';
    const stMap={active:'st-active',negotiation:'st-neg',inactive:'st-inactive'};
    const stLbl={active:'Ativo',negotiation:'Negociação',inactive:'Inativo'};
    const initials=c.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    card.innerHTML=`
      <span class="client-status ${stMap[c.status]}">${stLbl[c.status]}</span>
      <div class="client-card-top">
        <div class="client-avatar" style="background:${c.color}">${initials}</div>
        <div><div class="client-name">${c.name}</div><div class="client-type">${c.type}</div></div>
      </div>
      <div class="client-info">
        <strong>Contato:</strong> ${c.contact}<br>
        <strong>Projetos:</strong> ${c.projects||'—'}<br>
        ${c.notes?`<strong>Obs:</strong> ${c.notes}`:''}
      </div>
      <div class="client-actions">
        <button class="ca-btn" onclick="editCli('${c.id}')">Editar</button>
        <button class="ca-btn" onclick="delCli('${c.id}')">Remover</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openCliModal(id){
  A.editCliId=id||null;
  document.getElementById('cliModalTitle').textContent=id?'Editar cliente':'Novo cliente';
  const cp=document.getElementById('colorPicker');cp.innerHTML='';
  COLORS.forEach(col=>{
    const d=document.createElement('div');d.className='color-opt';d.style.background=col;
    d.dataset.color=col;
    d.onclick=()=>{document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('sel'));d.classList.add('sel')};
    cp.appendChild(d);
  });
  if(id){
    const c=A.clients.find(x=>x.id===id);
    if(c){
      document.getElementById('cName').value=c.name;
      document.getElementById('cType').value=c.type;
      document.getElementById('cContact').value=c.contact;
      document.getElementById('cStatus').value=c.status;
      document.getElementById('cProjects').value=c.projects||'';
      document.getElementById('cNotes').value=c.notes||'';
      const opt=cp.querySelector(`[data-color="${c.color}"]`);
      if(opt)opt.classList.add('sel');
    }
  } else {
    ['cName','cContact','cProjects','cNotes'].forEach(id2=>document.getElementById(id2).value='');
    cp.querySelector('.color-opt').classList.add('sel');
  }
  document.getElementById('cliModal').classList.add('open');
}
function closeCliModal(){document.getElementById('cliModal').classList.remove('open')}
function saveCli(){
  const name=document.getElementById('cName').value.trim();
  if(!name){alert('Informe o nome do cliente.');return}
  const color=document.querySelector('.color-opt.sel')?.dataset.color||COLORS[0];
  const data={
    name,type:document.getElementById('cType').value,
    contact:document.getElementById('cContact').value,
    status:document.getElementById('cStatus').value,
    projects:document.getElementById('cProjects').value,
    notes:document.getElementById('cNotes').value,color
  };
  if(A.editCliId){
    const idx=A.clients.findIndex(x=>x.id===A.editCliId);
    if(idx>-1)A.clients[idx]={...A.clients[idx],...data};
  } else {
    A.clients.push({id:uid(),...data});
  }
  save();closeCliModal();renderClients();initFilters();buildCliSelect();
}
function editCli(id){openCliModal(id)}
function delCli(id){
  const c=A.clients.find(x=>x.id===id);
  if(c&&confirm(`Remover "${c.name}"?`)){
    A.clients=A.clients.filter(x=>x.id!==id);
    save();renderClients();initFilters();buildCliSelect();
  }
}

// ── YEAR ──
function renderYear(){
  const g=document.getElementById('ycal');g.innerHTML='';
  const ts=fiso(new Date());
  for(let m=5;m<17;m++){
    const yr=m<12?2026:2027,mo=m<12?m:m-12;
    const card=document.createElement('div');card.className='mcrd';
    const h=document.createElement('div');h.className='mhdr';h.textContent=`${fmon(new Date(yr,mo,1))} ${yr}`;
    card.appendChild(h);
    const gd=document.createElement('div');gd.className='mgrid';
    ['D','S','T','Q','Q','S','S'].forEach(d=>{const l=document.createElement('div');l.className='wdl';l.textContent=d;gd.appendChild(l)});
    const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
    const st=new Date(first);st.setDate(st.getDate()-first.getDay());
    let cur=new Date(st);
    while(cur<=last||cur.getDay()!==0){
      const ds=fiso(cur);
      const hasEv=A.events.some(e=>e.date===ds);
      const isBlk=BLOCKED.includes(cur.getDay())&&cur.getMonth()===mo;
      const el=document.createElement('div');
      el.className='cd'+(cur.getMonth()!==mo?' other':'')+(hasEv?' hasev':'')+(isBlk?' blkd':'')+(ds===ts?' today':'');
      el.textContent=cur.getDate();
      el.onclick=()=>{document.getElementById('eD').value=ds;openEvModal()};
      gd.appendChild(el);
      cur.setDate(cur.getDate()+1);
    }
    card.appendChild(gd);g.appendChild(card);
  }
}

// ── ROUTINES ──
function renderRoutines(){
  const l=document.getElementById('rlist');l.innerHTML='';
  A.routines.forEach(r=>{
    const c=document.createElement('div');c.className='rcrd'+(r.done?' done':'');
    c.innerHTML=`<div style="flex:1"><div class="rn">${r.name}</div><div class="rm">${r.freq}${r.day?' · '+r.day:''}</div></div><input type="checkbox" ${r.done?'checked':''} style="accent-color:var(--b600);width:15px;height:15px;cursor:pointer" onchange="doneR('${r.id}')">`;
    l.appendChild(c);
  });
}
function doneR(id){const r=A.routines.find(x=>x.id===id);if(r){r.done=!r.done;save();renderRoutines();}}
function addRoutine(){
  const name=prompt('Nome da rotina:');if(!name)return;
  const freq=prompt('Frequência (diária/semanal/quinzenal/mensal):','semanal')||'semanal';
  const day=prompt('Dia (ex: segunda — vazio se diária):','')||'';
  A.routines.push({id:uid(),name,freq,day,done:false});
  save();renderRoutines();
}

// ── EVENT MODAL ──
function openEvModal(){
  if(!document.getElementById('eD').value)document.getElementById('eD').value=fiso(new Date());
  document.getElementById('eT').value='';document.getElementById('eN').value='';
  document.getElementById('eRecur').checked=false;
  document.getElementById('recurOpts').classList.remove('show');
  buildCliSelect();
  document.getElementById('evModal').classList.add('open');
  setTimeout(()=>document.getElementById('eT').focus(),200);
}
function closeEvModal(){document.getElementById('evModal').classList.remove('open')}
function togRecur(){
  document.getElementById('recurOpts').classList.toggle('show',document.getElementById('eRecur').checked);
  if(document.getElementById('eRecur').checked&&!document.getElementById('eUntil').value){
    const d=new Date();d.setMonth(d.getMonth()+2);document.getElementById('eUntil').value=fiso(d);
  }
}
function saveEv(){
  const title=document.getElementById('eT').value.trim();
  const date=document.getElementById('eD').value;
  const time=document.getElementById('eH').value;
  if(!title||!date||!time){alert('Preencha título, data e hora.');return}
  const ev={
    id:uid(),title,date,time,
    duration:parseInt(document.getElementById('eDur').value)||60,
    client:document.getElementById('eCli').value,
    type:document.getElementById('eTp').value,
    notes:document.getElementById('eN').value.trim(),
    isRoutine:false
  };
  if(document.getElementById('eRecur').checked){
    ev.recur={freq:document.getElementById('eFreq').value,until:document.getElementById('eUntil').value};
  }
  A.events.push(ev);save();closeEvModal();
  if(A.tab==='gantt')renderGantt();
  if(A.tab==='year')renderYear();
}
document.getElementById('evModal').addEventListener('click',e=>{if(e.target===document.getElementById('evModal'))closeEvModal()});
document.getElementById('cliModal').addEventListener('click',e=>{if(e.target===document.getElementById('cliModal'))closeCliModal()});
document.getElementById('eT').addEventListener('keydown',e=>{if(e.key==='Enter')saveEv()});
document.getElementById('zoomSlider').addEventListener('input',()=>{if(A.tab==='gantt')renderGantt()});

// ── EXPORT ──
function exportJSON(){
  const blob=new Blob([JSON.stringify({events:A.events,routines:A.routines,clients:A.clients},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='CORE-agenda.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ── INIT ──
document.getElementById('hdate').textContent=ffull(new Date());
initFilters();buildCliSelect();renderGantt();
</script>
