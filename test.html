<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;font-family:sans-serif;background:#f5f5f5}
body{display:grid;grid-template-rows:56px 1fr}
header{background:#1E5A91;color:white;display:flex;align-items:center;padding:0 20px;font-size:14px;font-weight:600}
main{display:grid;grid-template-columns:160px 1fr;overflow:hidden;height:calc(100vh - 56px)}
aside{background:white;border-right:1px solid #ddd;padding:16px}
.content{display:flex;flex-direction:column;overflow:hidden}
.gwrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ghead{display:flex;background:white;border-bottom:1px solid #ddd;flex-shrink:0}
.gcnr{width:56px;flex-shrink:0;border-right:1px solid #ddd;padding:8px;font-size:9px;color:#999;display:flex;align-items:flex-end}
.gdays{display:flex;flex:1}
.gdh{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border-right:1px solid #eee;font-size:11px;font-weight:600;color:#333}
.gbody{flex:1;display:flex;overflow:auto;min-height:0}
.gtc{width:56px;flex-shrink:0;border-right:1px solid #ddd;background:white;position:sticky;left:0}
.tslot{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 6px 0;border-bottom:1px solid #eee;font-family:monospace;font-size:9px;color:#aaa}
.day-cols{flex:1;display:flex;overflow:hidden}
.day-col{flex:1;position:relative;border-right:1px solid #eee}
.gevt{position:absolute;left:2px;right:2px;background:#E1ECF5;border-left:3px solid #1E5A91;border-radius:3px;padding:4px 6px;font-size:10px;font-weight:600;color:#0d3060;overflow:hidden}
</style>
</head>
<body>
<header>CORE · agenda</header>
<main>
<aside>Sidebar</aside>
<div class="content">
  <div class="gwrap">
    <div class="ghead">
      <div class="gcnr">hora</div>
      <div class="gdays" id="gdays"></div>
    </div>
    <div class="gbody">
      <div class="gtc" id="gtc"></div>
      <div class="day-cols" id="dayCols"></div>
    </div>
  </div>
</div>
</main>
<script>
const SH=8,EH=19,HPX=60;
const DAYS=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const today=new Date();
function pad(n){return String(n).padStart(2,'0')}

// Time col
const gtc=document.getElementById('gtc');
for(let h=SH;h<=EH;h++){
  const s=document.createElement('div');
  s.className='tslot';
  s.textContent=pad(h)+':00';
  gtc.appendChild(s);
}

// Days
const gdays=document.getElementById('gdays');
const dayCols=document.getElementById('dayCols');
const totH=(EH-SH)*HPX;

for(let i=0;i<7;i++){
  const d=new Date(today);
  d.setDate(d.getDate()-d.getDay()+1+i);
  
  const dh=document.createElement('div');
  dh.className='gdh';
  dh.textContent=DAYS[i]+' '+d.getDate();
  gdays.appendChild(dh);
  
  const col=document.createElement('div');
  col.className='day-col';
  col.style.height=totH+'px';
  
  // Hora lines
  for(let h=SH;h<=EH;h++){
    const l=document.createElement('div');
    l.style.cssText=`position:absolute;left:0;right:0;top:${(h-SH)*60}px;border-top:1px solid ${h%2===0?'#ddd':'#eee'}`;
    col.appendChild(l);
  }
  
  // Sample event
  if(i===0){
    const ev=document.createElement('div');
    ev.className='gevt';
    ev.style.top='60px';
    ev.style.height='60px';
    ev.textContent='09:00 · Reunião';
    col.appendChild(ev);
  }
  
  dayCols.appendChild(col);
}
document.title='TESTE OK - ' + document.getElementById('dayCols').children.length + ' colunas';
</script>
</body>
</html>
