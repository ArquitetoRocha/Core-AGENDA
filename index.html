<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE · Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--ink:#0E1116;--g600:#3A4250;--g500:#5C6675;--g400:#8A95A4;
--m200:#D7DCE3;--m100:#ECEFF3;--bone:#F5F6F8;--white:#FFFFFF;
--b700:#174876;--b600:#1E5A91;--b100:#E1ECF5;
--a700:#8C5A14;--a600:#B7771E;--a500:#D8902B;--a100:#FBF1DE;
--s600:#2F7D5B;--s100:#E1F0E8;--d600:#B5392E;--d100:#F8E2DF;
--fd:'Space Grotesk',system-ui;--fs:'Inter',system-ui;--fm:'JetBrains Mono',monospace}
html,body{font-family:var(--fs);background:var(--bone);color:var(--ink);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
body{display:grid;grid-template-rows:56px 1fr}
header{background:var(--white);border-bottom:1px solid var(--m200);padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--b600);letter-spacing:-.01em}
.brand em{color:var(--g500);font-style:normal;font-weight:400}
.hdate{font-family:var(--fm);font-size:11px;color:var(--g400)}
.hactions{display:flex;gap:8px}
.btn{padding:7px 14px;border:none;border-radius:6px;font-family:var(--fs);font-size:13px;font-weight:500;cursor:pointer;transition:all 120ms;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--b600);color:#fff}.btn-p:hover{background:var(--b700)}
.btn-s{background:var(--m100);color:var(--ink);border:1px solid var(--m200)}.btn-s:hover{background:var(--m200)}
main{display:grid;grid-template-columns:240px 1fr;overflow:hidden}
aside{background:var(--white);border-right:1px solid var(--m200);padding:20px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:24px}
.slbl{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--g500);margin-bottom:6px}
.nav{display:flex;flex-direction:column;gap:3px}
.nbtn{padding:9px 11px;background:transparent;border:1px solid transparent;border-radius:6px;font-size:13px;font-weight:500;color:var(--g600);cursor:pointer;transition:all 120ms;text-align:left;width:100%}
.nbtn:hover{background:var(--m100);color:var(--ink)}
.nbtn.on{background:var(--b100);color:var(--b600);border-color:var(--b600);font-weight:600}
.cli{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--g600);transition:all 100ms}
.cli:hover{background:var(--m100)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sinfo{font-size:12px;color:var(--g600);line-height:1.9}
.sinfo code{font-family:var(--fm);font-size:11px;background:var(--m100);padding:2px 6px;border-radius:4px;color:var(--g500)}
.content{padding:28px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.ch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--m200)}
.ctitle{font-family:var(--fd);font-size:26px;font-weight:600;color:var(--ink)}
.csub{font-size:13px;color:var(--g600);margin-top:6px}
.tab{display:none}.tab.on{display:block}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.dcard{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:14px;min-height:220px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 0 rgba(14,17,22,.04)}
.dcard.wknd{background:rgba(216,144,43,.03)}
.dhdr{padding-bottom:8px;border-bottom:1px solid var(--m200);margin-bottom:4px}
.dday{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--ink)}
.ddate{font-family:var(--fm);font-size:10px;color:var(--g500);display:block;margin-top:3px}
.ev{padding:7px 9px;font-size:11px;cursor:pointer;transition:all 120ms;border-left:2px solid transparent;border-radius:0}
.ev:hover{opacity:.85;transform:translateY(-1px)}
.ev .et{font-family:var(--fm);font-size:10px;opacity:.75;margin-bottom:1px}
.ev .en{font-weight:600;line-height:1.3}
.vier{background:var(--b100);color:var(--b700);border-left-color:var(--b600)}
.dimer{background:var(--a100);color:var(--a700);border-left-color:var(--a500)}
.core{background:var(--m100);color:var(--g600);border-left-color:var(--g500)}
.avalon{background:var(--s100);color:var(--s600);border-left-color:var(--s600)}
.wnav{display:flex;gap:6px}
.wnav button{padding:6px 11px;border:1px solid var(--m200);background:var(--white);border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink);transition:all 100ms}
.wnav button:hover{background:var(--m100)}
.ycal{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.mcrd{background:var(--white);border:1px solid var(--m200);border-radius:10px;overflow:hidden}
.mhdr{background:var(--m100);padding:9px 12px;font-family:var(--fd);font-size:12px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--m200)}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px}
.wdl{text-align:center;font-size:9px;color:var(--g500);padding:3px 0;font-weight:600;text-transform:uppercase}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:4px;color:var(--g600);cursor:pointer;transition:all 100ms}
.cd:hover{background:var(--m100)}
.cd.other{color:var(--m200)}
.cd.hasev{background:var(--b100);color:var(--b700);font-weight:600}
.cd.today{background:var(--b600);color:#fff;font-weight:600}
.rlist{display:flex;flex-direction:column;gap:8px;max-width:520px}
.rcrd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--white);border:1px solid var(--m200);border-radius:10px;transition:all 120ms}
.rcrd:hover{background:var(--bone)}
.rcrd.done .rn{text-decoration:line-through;color:var(--g500)}
.rn{font-weight:500;font-size:14px;color:var(--ink)}
.rm{font-size:12px;color:var(--g500);margin-top:2px}
.conflict{padding:8px 12px;background:var(--d100);border-radius:6px;font-size:12px;color:var(--d600);margin-bottom:12px;border-left:2px solid var(--d600)}
.overlay{position:fixed;inset:0;background:rgba(14,17,22,.52);z-index:100;display:flex;align-items:center;justify-content:center}
.mbox{background:var(--white);border-radius:12px;padding:24px;max-width:440px;width:90%;box-shadow:0 12px 32px rgba(14,17,22,.12);animation:up 180ms cubic-bezier(.2,0,.2,1)}
@keyframes up{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.mttl{font-family:var(--fd);font-size:18px;font-weight:600;margin:0 0 18px;color:var(--ink)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fl{font-family:var(--fd);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--g600)}
.fi,.fsel{padding:9px 11px;border:1px solid var(--m200);border-radius:6px;font-family:var(--fs);font-size:14px;color:var(--ink);background:var(--white);width:100%;transition:all 120ms}
.fi:focus,.fsel:focus{outline:0;border-color:var(--b600);box-shadow:0 0 0 3px rgba(30,90,145,.12)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.mbtns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.mbtns button{padding:9px 16px;border:none;border-radius:6px;font-family:var(--fs);font-size:13px;font-weight:600;cursor:pointer;transition:all 120ms}
.mbtns .cancel{background:var(--m100);color:var(--ink);border:1px solid var(--m200)}.mbtns .cancel:hover{background:var(--m200)}
.mbtns .save{background:var(--b600);color:#fff}.mbtns .save:hover{background:var(--b700)}
</style>
</head>
<body>
<header>
  <div class="brand">CORE <em>· agenda</em></div>
  <div class="hdate" id="hdate"></div>
  <div class="hactions">
    <button class="btn btn-s" onclick="exportJSON()">↓ exportar</button>
    <button class="btn btn-p" onclick="showModal()">+ novo evento</button>
  </div>
</header>
<main>
  <aside>
    <div>
      <div class="slbl">Visualização</div>
      <div class="nav">
        <button class="nbtn on" id="bn-week" onclick="go('week')">Semana</button>
        <button class="nbtn" id="bn-year" onclick="go('year')">Calendário</button>
        <button class="nbtn" id="bn-routines" onclick="go('routines')">Rotinas</button>
      </div>
    </div>
    <div>
      <div class="slbl">Clientes</div>
      <label class="cli"><input type="checkbox" checked onchange="tog('vier')" style="accent-color:var(--b600)"><span class="dot" style="background:var(--b600)"></span>Vier Engenharia</label>
      <label class="cli"><input type="checkbox" checked onchange="tog('dimer')" style="accent-color:var(--a500)"><span class="dot" style="background:var(--a500)"></span>R. Dimer</label>
      <label class="cli"><input type="checkbox" checked onchange="tog('core')" style="accent-color:var(--g500)"><span class="dot" style="background:var(--g500)"></span>CORE</label>
      <label class="cli"><input type="checkbox" checked onchange="tog('avalon')" style="accent-color:var(--s600)"><span class="dot" style="background:var(--s600)"></span>Avalon</label>
    </div>
    <div>
      <div class="slbl">Horário fixo</div>
      <div class="sinfo"><strong>Seg–Sáb</strong><br><code>08:00–12:00</code><br><code>13:30–18:00</code></div>
    </div>
    <div>
      <div class="slbl">Blocos Vier</div>
      <div class="sinfo"><strong>Ter & Qui</strong><br>Torres → Cricíuma<br><code>08:00–18:00</code></div>
    </div>
  </aside>
  <div class="content">

    <div class="tab on" id="tab-week">
      <div class="ch">
        <div><p class="ctitle">Semana</p><p class="csub" id="wsub"></p></div>
        <div class="wnav">
          <button onclick="pw()">←</button>
          <button onclick="nw()">→</button>
        </div>
      </div>
      <div id="cf"></div>
      <div class="wgrid" id="wgrid"></div>
    </div>

    <div class="tab" id="tab-year">
      <div class="ch"><div><p class="ctitle">Calendário 2026–2027</p><p class="csub">Junho 2026 em diante — clique num dia para criar evento</p></div></div>
      <div class="ycal" id="ycal"></div>
    </div>

    <div class="tab" id="tab-routines">
      <div class="ch">
        <div><p class="ctitle">Rotinas</p><p class="csub">Hábitos e tarefas recorrentes</p></div>
        <button class="btn btn-s" onclick="addR()">+ rotina</button>
      </div>
      <div class="rlist" id="rlist"></div>
    </div>

  </div>
</main>

<div id="modal" style="display:none">
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="mbox">
      <p class="mttl">Novo evento</p>
      <div class="fg"><label class="fl">Título</label><input class="fi" id="eT" type="text" placeholder="ex: Reunião de coordenação"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Data</label><input class="fi" id="eD" type="date"></div>
        <div class="fg"><label class="fl">Hora</label><input class="fi" id="eH" type="time"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Duração (min)</label><input class="fi" id="eDur" type="number" value="60" min="15" step="15"></div>
        <div class="fg"><label class="fl">Cliente</label>
          <select class="fsel" id="eCli">
            <option value="vier">Vier Engenharia</option>
            <option value="dimer">R. Dimer</option>
            <option value="core">CORE</option>
            <option value="avalon">Avalon</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">Tipo</label>
        <select class="fsel" id="eTp">
          <option value="meeting">Reunião presencial</option>
          <option value="online">Reunião online</option>
          <option value="work">Bloco de trabalho</option>
          <option value="deadline">Prazo / entrega</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Observações</label><input class="fi" id="eN" type="text" placeholder="local, link, detalhes..."></div>
      <div class="mbtns">
        <button class="cancel" onclick="closeModal()">Cancelar</button>
        <button class="save" onclick="saveEv()">Criar evento</button>
      </div>
    </div>
  </div>
</div>

<script>
const A={
  events:JSON.parse(localStorage.getItem('coreEv')||'[]'),
  routines:JSON.parse(localStorage.getItem('coreRot')||'null')||[
    {id:1,name:'Post Instagram (@core)',freq:'semanal',day:'segunda',done:false},
    {id:2,name:'Revisão financeira',freq:'semanal',day:'sexta',done:false},
    {id:3,name:'Reunião de planejamento CORE',freq:'semanal',day:'segunda',done:false},
    {id:4,name:'Análise de interferências',freq:'diária',day:'',done:false}
  ],
  cli:{vier:true,dimer:true,core:true,avalon:true},
  mon:monday(new Date()),tab:'week'
};

function pad(n){return String(n).padStart(2,'0')}
function monday(d){const dt=new Date(d),dy=dt.getDay();dt.setDate(dt.getDate()-dy+(dy===0?-6:1));return dt}
function fmt(d,f){
  const dt=new Date(d);
  if(f==='iso') return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
  if(f==='dmm') return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}`;
  if(f==='full') return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}/${dt.getFullYear()}`;
  if(f==='wd') return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dt.getDay()];
  if(f==='mon') return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][dt.getMonth()];
}
function save(){localStorage.setItem('coreEv',JSON.stringify(A.events));localStorage.setItem('coreRot',JSON.stringify(A.routines))}

function go(tab){
  A.tab=tab;
  ['week','year','routines'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on',t===tab);
    document.getElementById('bn-'+t).classList.toggle('on',t===tab);
  });
  if(tab==='week')rW();
  if(tab==='year')rY();
  if(tab==='routines')rR();
}

function tog(c){A.cli[c]=!A.cli[c];if(A.tab==='week')rW()}

function rW(){
  const sun=new Date(A.mon);sun.setDate(sun.getDate()+6);
  document.getElementById('wsub').textContent=`Semana de ${fmt(A.mon,'dmm')} a ${fmt(sun,'full')}`;
  const g=document.getElementById('wgrid');g.innerHTML='';
  let cfs=[];
  for(let i=0;i<7;i++){
    const d=new Date(A.mon);d.setDate(d.getDate()+i);
    const ds=fmt(d,'iso');
    const evs=A.events.filter(e=>e.date===ds&&A.cli[e.client]);
    const times=evs.map(e=>e.time);
    times.filter((t,i)=>times.indexOf(t)!==i).forEach(t=>{if(!cfs.includes(t))cfs.push(`${fmt(d,'wd')} ${t}`)});
    const card=document.createElement('div');
    card.className='dcard'+(i>=5?' wknd':'');
    card.innerHTML=`<div class="dhdr"><div class="dday">${fmt(d,'wd')}</div><span class="ddate">${fmt(d,'dmm')}</span></div>`;
    evs.forEach(e=>{
      const el=document.createElement('div');
      el.className=`ev ${e.client}`;
      el.innerHTML=`<div class="et">${e.time}</div><div class="en">${e.title}</div>`;
      el.onclick=()=>{if(confirm(`Deletar "${e.title}"?`)){A.events=A.events.filter(x=>x.id!==e.id);save();rW()}};
      card.appendChild(el);
    });
    g.appendChild(card);
  }
  const cf=document.getElementById('cf');
  cf.innerHTML=cfs.length?`<div class="conflict">⚠ Conflito de horário: ${cfs.join(', ')}</div>`:'';
}

function pw(){A.mon.setDate(A.mon.getDate()-7);rW()}
function nw(){A.mon.setDate(A.mon.getDate()+7);rW()}

function rY(){
  const g=document.getElementById('ycal');g.innerHTML='';
  const todayStr=fmt(new Date(),'iso');
  for(let m=5;m<17;m++){
    const yr=m<12?2026:2027,mo=m<12?m:m-12;
    const card=document.createElement('div');card.className='mcrd';
    const h=document.createElement('div');h.className='mhdr';h.textContent=`${fmt(new Date(yr,mo,1),'mon')} ${yr}`;
    card.appendChild(h);
    const grid=document.createElement('div');grid.className='mgrid';
    ['D','S','T','Q','Q','S','S'].forEach(d=>{const l=document.createElement('div');l.className='wdl';l.textContent=d;grid.appendChild(l)});
    const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
    const start=new Date(first);start.setDate(start.getDate()-first.getDay());
    let cur=new Date(start);
    while(cur<=last||cur.getDay()!==0){
      const ds=fmt(cur,'iso');
      const hasEv=A.events.some(e=>e.date===ds);
      const el=document.createElement('div');
      el.className='cd'+(cur.getMonth()!==mo?' other':'')+(hasEv?' hasev':'')+(ds===todayStr?' today':'');
      el.textContent=cur.getDate();
      el.onclick=()=>{document.getElementById('eD').value=ds;showModal()};
      grid.appendChild(el);
      cur.setDate(cur.getDate()+1);
    }
    card.appendChild(grid);g.appendChild(card);
  }
}

function rR(){
  const l=document.getElementById('rlist');l.innerHTML='';
  A.routines.forEach(r=>{
    const c=document.createElement('div');c.className='rcrd'+(r.done?' done':'');
    c.innerHTML=`<div style="flex:1"><div class="rn">${r.name}</div><div class="rm">${r.freq}${r.day?' · '+r.day:''}</div></div><input type="checkbox" ${r.done?'checked':''} style="accent-color:var(--b600);width:17px;height:17px;cursor:pointer" onchange="dR(${r.id})">`;
    l.appendChild(c);
  });
}

function dR(id){const r=A.routines.find(x=>x.id===id);if(r)r.done=!r.done;save();rR()}

function addR(){
  const name=prompt('Nome da rotina:');if(!name)return;
  const freq=prompt('Frequência:','semanal')||'semanal';
  const day=prompt('Dia (ex: segunda — deixe vazio se diária):','')||'';
  A.routines.push({id:Date.now(),name,freq,day,done:false});
  save();rR();
}

function showModal(){
  if(!document.getElementById('eD').value)document.getElementById('eD').value=fmt(new Date(),'iso');
  document.getElementById('eH').value='09:00';
  document.getElementById('eT').value='';
  document.getElementById('eN').value='';
  document.getElementById('modal').style.display='block';
  setTimeout(()=>document.getElementById('eT').focus(),50);
}

function closeModal(){document.getElementById('modal').style.display='none'}

function saveEv(){
  const t=document.getElementById('eT').value.trim();
  const d=document.getElementById('eD').value;
  const h=document.getElementById('eH').value;
  if(!t||!d||!h){alert('Preencha título, data e hora.');return}
  A.events.push({
    id:Date.now(),title:t,date:d,time:h,
    duration:parseInt(document.getElementById('eDur').value),
    client:document.getElementById('eCli').value,
    type:document.getElementById('eTp').value,
    notes:document.getElementById('eN').value.trim()
  });
  save();closeModal();
  if(A.tab==='week')rW();
  if(A.tab==='year')rY();
}

function exportJSON(){
  const blob=new Blob([JSON.stringify({events:A.events,routines:A.routines},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='CORE-agenda.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

document.getElementById('hdate').textContent=fmt(new Date(),'full');
rW();
</script>
</body>
</html>
