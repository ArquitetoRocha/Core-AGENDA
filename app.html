<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE · Agenda</title>
<!-- build: v5.1 -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --ink:#0E1116;--g600:#3A4250;--g500:#5C6675;--g400:#8A95A4;
  --m200:#D7DCE3;--m100:#ECEFF3;--bone:#F5F6F8;--white:#fff;
  --b700:#174876;--b600:#1E5A91;--b500:#2C72AE;--b100:#E1ECF5;
  --a700:#8C5A14;--a500:#D8902B;--a100:#FBF1DE;
  --s600:#2F7D5B;--s100:#E1F0E8;
  --d600:#B5392E;--d100:#F8E2DF;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui;background:var(--bone);color:var(--ink)}
#app{display:grid;grid-template-rows:56px 1fr;height:100vh}
#hdr{background:rgba(255,255,255,.96);border-bottom:1px solid var(--m200);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;z-index:50;box-shadow:0 1px 2px rgba(14,17,22,.06)}
#main{display:grid;grid-template-columns:196px 1fr;overflow:hidden}
#aside{background:rgba(255,255,255,.92);border-right:1px solid var(--m200);padding:14px 11px;overflow-y:auto}
#content{overflow:hidden;position:relative;height:100%}
.brand{display:flex;align-items:center;gap:9px}
.bmark{width:28px;height:28px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center}
.bmark svg{width:16px;height:16px}
.bname{font-family:'Space Grotesk',system-ui;font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.02em}
.bname em{color:var(--g500);font-weight:400;font-style:normal}
.hctr{display:flex;align-items:center;gap:10px}
.wnav{display:flex;align-items:center;gap:5px}
.wnav button{width:26px;height:26px;border:1px solid var(--m200);background:var(--white);border-radius:6px;cursor:pointer;font-size:14px;color:var(--g600);display:flex;align-items:center;justify-content:center}
.wnav button:hover{background:var(--m100)}
#wlbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g500);min-width:110px;text-align:center}
.zwrap{display:flex;align-items:center;gap:6px;background:var(--m100);border:1px solid var(--m200);border-radius:10px;padding:3px 8px}
.zlbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g400)}
.zbtn{width:20px;height:20px;border:1px solid var(--m200);background:var(--white);border-radius:4px;cursor:pointer;font-size:13px;color:var(--g600);display:flex;align-items:center;justify-content:center;line-height:1}
.zbtn:hover{background:var(--bone)}
#zlvl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--b600);min-width:28px;text-align:center}
.dnav{display:none;align-items:center;gap:5px}
.dnav.show{display:flex}
.dnav button{padding:2px 8px;border:1px solid var(--m200);background:var(--white);border-radius:5px;font-size:11px;color:var(--g600);cursor:pointer}
.dnav button:hover{background:var(--m100)}
#dlbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--g500);min-width:90px;text-align:center}
.hrt{display:flex;align-items:center;gap:8px}
#hdate{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g400)}
.hbtn{padding:6px 14px;border:none;border-radius:6px;font-family:'Inter',system-ui;font-size:12px;font-weight:500;cursor:pointer}
.hbtn.p{background:var(--b600);color:#fff}.hbtn.p:hover{background:var(--b700)}
.hbtn.s{background:var(--m100);color:var(--ink);border:1px solid var(--m200)}.hbtn.s:hover{background:var(--m200)}
.slbl{font-family:'Space Grotesk',system-ui;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g400);margin-bottom:4px;margin-top:12px;display:block}
.slbl:first-child{margin-top:0}
.nav{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.snbtn{padding:7px 9px;background:transparent;border:1px solid transparent;border-radius:6px;font-size:12px;font-weight:500;color:var(--g600);cursor:pointer;text-align:left;width:100%;display:flex;align-items:center;gap:6px;font-family:'Inter',system-ui}
.snbtn:hover{background:var(--m100)}.snbtn.on{background:var(--b100);color:var(--b600);border-color:#B7D2E6;font-weight:600}
.snbtn .nd{width:12px;height:12px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0}
.clist{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.cli{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;font-size:11px;color:var(--g600);cursor:pointer}
.cli:hover{background:var(--m100)}.cli input{accent-color:var(--b600);width:12px;height:12px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sdiv{height:1px;background:var(--m200);margin:8px 0}
.sinfo{font-size:11px;color:var(--g600);line-height:1.8}
.sinfo code{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--m100);padding:1px 5px;border-radius:3px;color:var(--g500)}
.tab{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.tab.on{display:flex;flex-direction:column}
/* WEEK VIEW */
.wv-wrap{display:flex;flex-direction:column;height:100%}
.cbar{padding:6px 16px;background:var(--d100);border-bottom:1px solid rgba(181,57,46,.2);font-size:11px;color:var(--d600);display:none;align-items:center;gap:6px;flex-shrink:0}
.cbar.show{display:flex}
.wv-head{display:flex;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--m200);position:relative;z-index:10}
.wv-tcol{width:52px;flex-shrink:0;border-right:1px solid var(--m200);padding:6px 4px;display:flex;align-items:flex-end;justify-content:flex-end}
.wv-tcol span{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--g400)}
.wv-days-hdr{display:flex;flex:1;overflow:hidden}
.wv-dh{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px;border-right:1px solid var(--m100);cursor:pointer;position:relative}
.wv-dh:last-child{border-right:none}
.wv-dh:hover{background:var(--bone)}
.wv-dh.tod{background:var(--b100)}
.wv-dh.blk{background:rgba(30,90,145,.04)}
.wv-dname{font-family:'Space Grotesk',system-ui;font-size:9px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.06em}
.wv-dnum{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--ink);line-height:1.1}
.wv-dh.tod .wv-dnum{color:var(--b600)}
.wv-dtag{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.wv-dtag.vt{color:var(--b600)}.wv-dtag.ft{color:var(--s600)}
.wv-body{flex:1;display:flex;overflow-y:auto;overflow-x:hidden;position:relative}
.wv-times{width:52px;flex-shrink:0;border-right:1px solid var(--m200);background:var(--white);position:sticky;left:0;z-index:5}
.wv-tslot{display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;border-bottom:1px solid transparent;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g400);padding-top:2px}
.wv-tslot.maj{border-bottom-color:var(--m200)}
.wv-days{flex:1;display:flex;position:relative}
.wv-day{flex:1;min-width:0;position:relative;border-right:1px solid var(--m100)}
.wv-day:last-child{border-right:none}
.wv-day.blk{background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(30,90,145,.015) 8px,rgba(30,90,145,.015) 16px)}
.wv-day.wknd{background:rgba(216,144,43,.015)}
.wv-hline{position:absolute;left:0;right:0;pointer-events:none}
.wv-hline.maj{border-top:1px solid var(--m200)}
.wv-hline.min{border-top:1px solid var(--m100)}
.wv-nowline{position:absolute;left:0;right:0;border-top:2px solid var(--d600);pointer-events:none;z-index:8}
.wv-nowline::before{content:'';position:absolute;left:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--d600)}
.wv-blkl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.wv-blkl span{font-family:'Space Grotesk',system-ui;font-size:9px;font-weight:700;color:var(--b600);letter-spacing:.1em;text-transform:uppercase;opacity:.25;writing-mode:vertical-rl;transform:rotate(180deg)}
/* EVENTO */
.gevt{position:absolute;padding:3px 6px 3px 7px;border-left:3px solid transparent;border-radius:4px;overflow:hidden;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;min-height:20px;transition:box-shadow 120ms,opacity 120ms}
.gevt:hover{z-index:20;box-shadow:0 3px 12px rgba(14,17,22,.14)}
.gevt.dragging{opacity:.72;box-shadow:0 8px 24px rgba(14,17,22,.18);z-index:200;cursor:grabbing;transition:none}
.gevt.done-ev .etitle{text-decoration:line-through;opacity:.55}
.gevt.locked-ev{cursor:default}
.gevt.locked-ev .etitle::after{content:' 🔒';font-size:8px;opacity:.6}
.gevt.selected-ev{outline:2px solid var(--b600);outline-offset:1px}
.etime{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:.65;white-space:nowrap}
.etitle{font-size:10px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:9px;opacity:.58;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* botões dentro do evento: cadeado, delete, checkbox — alinhados à direita em fila */
.ev-actions{position:absolute;top:3px;right:2px;display:flex;align-items:center;gap:2px}
.ev-cb{width:11px;height:11px;cursor:pointer;accent-color:var(--s600)}
.ev-del{width:13px;height:13px;border:none;background:transparent;color:inherit;font-size:11px;cursor:pointer;opacity:0;border-radius:2px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center}
.gevt:hover .ev-del{opacity:.5}
.ev-del:hover{opacity:1!important;background:rgba(181,57,46,.18);color:var(--d600)}
.vier-ev{background:rgba(225,236,245,.9);color:#0d3060;border-left-color:var(--b600)}
.dimer-ev{background:rgba(251,241,222,.9);color:var(--a700);border-left-color:var(--a500)}
.core-ev{background:rgba(236,239,243,.9);color:var(--g600);border-left-color:var(--g500)}
.avalon-ev{background:rgba(225,240,232,.9);color:var(--s600);border-left-color:var(--s600)}
/* Tooltip */
.tt{position:fixed;background:var(--ink);color:#fff;border-radius:10px;padding:9px 12px;font-size:11px;pointer-events:none;z-index:9999;box-shadow:0 8px 24px rgba(14,17,22,.2);max-width:220px;opacity:0;transition:opacity 100ms}
.tt.show{opacity:1}
.ttt{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--g400);margin-bottom:3px}
.ttl{font-weight:600;font-size:12px;margin-bottom:2px}.tts{font-size:10px;color:var(--g400)}
/* Barra de seleção múltipla */
#sel-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;display:none;align-items:center;gap:12px;font-size:12px;box-shadow:0 8px 24px rgba(14,17,22,.3);z-index:300;white-space:nowrap}
#sel-bar.show{display:flex}
#sel-bar button{padding:5px 12px;border:1px solid rgba(255,255,255,.25);border-radius:6px;background:transparent;color:#fff;font-size:11px;cursor:pointer}
#sel-bar button:hover{background:rgba(255,255,255,.12)}
#sel-bar button.danger{border-color:var(--d600);color:#ff8a80}
/* TASKS */
.twrap{padding:20px;overflow-y:auto;height:100%}
.tfilters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tfbtn{padding:5px 12px;border:1px solid var(--m200);background:var(--white);border-radius:999px;font-size:11px;cursor:pointer;color:var(--g600)}
.tfbtn.on{background:var(--b600);color:#fff;border-color:var(--b600)}
.tklist{display:flex;flex-direction:column;gap:8px;max-width:680px}
.tkcard{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:12px 14px;box-shadow:0 1px 2px rgba(14,17,22,.06);display:flex;align-items:flex-start;gap:10px}
.tkcard:hover{background:var(--bone)}
.tkcard.done-task .tktitle{text-decoration:line-through;color:var(--g400)}
.tkchk{width:17px;height:17px;accent-color:var(--b600);cursor:pointer;flex-shrink:0;margin-top:2px}
.tkbody{flex:1;cursor:pointer}
.tktitle{font-size:13px;font-weight:500;margin-bottom:4px}
.tkmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tkcli{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:600}
.tkdue{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--g500)}
.tkdue.ov{color:var(--d600);font-weight:600}.tkdue.tod{color:var(--a700);font-weight:600}
.tkprio{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.ph{background:var(--d100);color:var(--d600)}.pm{background:var(--a100);color:var(--a700)}.pl{background:var(--s100);color:var(--s600)}
.tktype{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:999px;border:none}
.tkdel{padding:4px 8px;border:1px solid var(--m200);background:transparent;border-radius:6px;font-size:11px;color:var(--g500);cursor:pointer;flex-shrink:0}
.tkdel:hover{background:var(--d100);color:var(--d600)}
/* DASH */
.dwrap{padding:20px;overflow-y:auto;height:100%}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(14,17,22,.06)}
.klbl{font-family:'Space Grotesk',system-ui;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--g500);margin-bottom:8px}
.kval{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:500;color:var(--ink);line-height:1}
.ksub{font-size:11px;color:var(--g500);margin-top:4px}
.kval.pos{color:var(--s600)}.kval.warn{color:var(--a500)}
.bchart{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(14,17,22,.06);margin-bottom:12px}
.bchart h4{font-family:'Space Grotesk',system-ui;font-size:12px;font-weight:600;margin-bottom:14px}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.blbl2{font-size:11px;color:var(--g600);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrack{flex:1;height:7px;background:var(--m100);border-radius:999px;overflow:hidden}
.bfill{height:100%;border-radius:999px}
.bval{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--g500);width:30px;text-align:right}
.drow2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.scard{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(14,17,22,.06)}
.snum{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:500;color:var(--b600)}
.rdash{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(14,17,22,.06)}
.rrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--m100);font-size:12px}
.rrow:last-child{border-bottom:none}
.ai-card{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(14,17,22,.06)}
.ai-card h4{font-family:'Space Grotesk',system-ui;font-size:12px;font-weight:600;margin-bottom:12px}
.ai-body{font-size:13px;color:var(--g600);line-height:1.7;white-space:pre-wrap}
.ai-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g500)}
.aidot{width:6px;height:6px;border-radius:50%;background:var(--a500);animation:pulse 1s infinite}
.aidot:nth-child(2){animation-delay:.2s}.aidot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
/* CLIENTS */
.clwrap{padding:20px;overflow-y:auto;height:100%}
.clgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.clcard{background:var(--white);border:1px solid var(--m200);border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(14,17,22,.06);position:relative}
.cltop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.clav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',system-ui;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.clname{font-family:'Space Grotesk',system-ui;font-size:14px;font-weight:600}.cltype{font-size:11px;color:var(--g500)}
.clst{position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.sta{background:var(--s100);color:var(--s600)}.stn{background:var(--a100);color:var(--a700)}.sti{background:var(--m100);color:var(--g500)}
.clinfo{font-size:11px;color:var(--g600);line-height:1.8}
.clact{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--m200)}
.cabtn{padding:5px 10px;border:1px solid var(--m200);background:transparent;border-radius:6px;font-size:11px;color:var(--g600);cursor:pointer}
.cabtn:hover{background:var(--m100)}
/* YEAR */
.ycwrap{padding:16px;overflow-y:auto;height:100%}
.ycal{display:grid;grid-template-columns:repeat(auto-fit,minmax(196px,1fr));gap:12px}
.mcrd{background:var(--white);border:1px solid var(--m200);border-radius:10px;overflow:hidden;box-shadow:0 1px 2px rgba(14,17,22,.06)}
.mhdr{background:var(--m100);padding:7px 11px;font-family:'Space Grotesk',system-ui;font-size:11px;font-weight:600;border-bottom:1px solid var(--m200)}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:7px}
.wdl{text-align:center;font-size:8px;color:var(--g500);padding:2px 0;font-weight:600;text-transform:uppercase}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:3px;color:var(--g600);cursor:pointer}
.cd:hover{background:var(--m100)}.cd.other{color:#C8CDD4}.cd.hasev{background:var(--b100);color:var(--b600);font-weight:600}.cd.hastask{background:var(--a100);color:var(--a700)}.cd.today{background:var(--b600);color:#fff;font-weight:600}.cd.blkd{background:rgba(30,90,145,.07);color:var(--b600)}
/* ROUTINES */
.rwrap{padding:20px;overflow-y:auto;height:100%}
.rlist{display:flex;flex-direction:column;gap:7px;max-width:540px}
.rcrd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--white);border:1px solid var(--m200);border-radius:10px;box-shadow:0 1px 2px rgba(14,17,22,.06)}
.rcrd:hover{background:var(--bone)}.rcrd.done .rn{text-decoration:line-through;color:var(--g400)}
.rn{font-weight:500;font-size:13px}.rm{font-size:11px;color:var(--g500);margin-top:2px}
.rcrd input[type=checkbox]{accent-color:var(--b600);width:15px;height:15px;cursor:pointer}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(14,17,22,.52);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 180ms}
.mbg.open{opacity:1;pointer-events:all}
.mbox{background:var(--white);border-radius:14px;padding:22px;max-width:480px;width:92%;box-shadow:0 16px 48px rgba(14,17,22,.16);transform:translateY(10px);transition:transform 180ms;border:1px solid var(--m200)}
.mbg.open .mbox{transform:translateY(0)}.mbox.wide{max-width:520px}
.mttl{font-family:'Space Grotesk',system-ui;font-size:17px;font-weight:600;margin:0 0 18px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-family:'Space Grotesk',system-ui;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g600)}
.fi,.fsel,.fta{padding:8px 11px;border:1px solid var(--m200);border-radius:6px;font-family:'Inter',system-ui;font-size:13px;color:var(--ink);background:var(--white);width:100%}
.fta{resize:vertical;min-height:64px;line-height:1.5}
.fi:focus,.fsel:focus,.fta:focus{outline:0;border-color:var(--b600);box-shadow:0 0 0 3px rgba(30,90,145,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mbtns button{padding:8px 15px;border:none;border-radius:6px;font-family:'Inter',system-ui;font-size:12px;font-weight:600;cursor:pointer}
.mbcancel{background:var(--m100);color:var(--ink);border:1px solid var(--m200)}
.mbsave{background:var(--b600);color:#fff}
.mbdel{background:var(--d100);color:var(--d600);border:1px solid rgba(181,57,46,.3)}
.recur-sec{background:var(--bone);border:1px solid var(--m200);border-radius:6px;padding:10px 12px;margin-bottom:12px}
.recur-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--g600)}
.recur-toggle input{accent-color:var(--b600)}
.recur-opts{margin-top:10px;display:none;flex-direction:column;gap:8px}
.recur-opts.show{display:flex}
.cpicker{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.copt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.copt.sel{border-color:var(--ink);transform:scale(1.15)}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div class="brand">
      <div class="bmark">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2" fill="#D8902B"/>
          <circle cx="2" cy="4" r="1.2" fill="white" opacity=".7"/>
          <circle cx="14" cy="4" r="1.2" fill="white" opacity=".7"/>
          <circle cx="2" cy="12" r="1.2" fill="white" opacity=".7"/>
          <circle cx="14" cy="12" r="1.2" fill="white" opacity=".7"/>
          <line x1="3.2" y1="4" x2="6" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
          <line x1="12.8" y1="4" x2="10" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
          <line x1="3.2" y1="12" x2="6" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
          <line x1="12.8" y1="12" x2="10" y2="8" stroke="white" stroke-width=".8" opacity=".5"/>
        </svg>
      </div>
      <div class="bname">CORE <em>· agenda</em></div>
    </div>
    <div class="hctr">
      <div class="wnav">
        <button onclick="pw()">‹</button>
        <span id="wlbl"></span>
        <button onclick="nw()">›</button>
      </div>
      <div class="dnav" id="dnav">
        <button onclick="pd()">‹</button>
        <span id="dlbl"></span>
        <button onclick="nd()">›</button>
      </div>
      <div class="zwrap">
        <span class="zlbl">zoom</span>
        <button class="zbtn" onclick="zoomOut()">−</button>
        <span id="zlvl">1,0 ×</span>
        <button class="zbtn" onclick="zoomIn()">+</button>
      </div>
    </div>
    <div class="hrt">
      <span id="hdate"></span>
      <button class="hbtn s" onclick="exportJSON()">↓ exportar</button>
      <button class="hbtn p" onclick="openEvModal()">+ evento</button>
    </div>
  </header>
  <div id="main">
    <aside id="aside">
      <span class="slbl">Visualização</span>
      <div class="nav">
        <button class="snbtn on" id="bn-gantt" onclick="go('gantt')"><span class="nd"></span>Semana</button>
        <button class="snbtn" id="bn-tasks" onclick="go('tasks')"><span class="nd"></span>Tarefas</button>
        <button class="snbtn" id="bn-dash" onclick="go('dash')"><span class="nd"></span>Dashboard</button>
        <button class="snbtn" id="bn-clients" onclick="go('clients')"><span class="nd"></span>Clientes</button>
        <button class="snbtn" id="bn-year" onclick="go('year')"><span class="nd"></span>Calendário</button>
        <button class="snbtn" id="bn-routines" onclick="go('routines')"><span class="nd"></span>Rotinas</button>
      </div>
      <div class="sdiv"></div>
      <span class="slbl">Clientes</span>
      <div class="clist" id="cliFilters"></div>
      <div class="sdiv"></div>
      <span class="slbl">Tipo</span>
      <div class="clist">
        <label class="cli"><input type="checkbox" checked onchange="togType('routine')"><span class="dot" style="background:#B7BFCB"></span>Rotina</label>
        <label class="cli"><input type="checkbox" checked onchange="togType('event')"><span class="dot" style="background:#2C72AE"></span>Evento</label>
      </div>
      <div class="sdiv"></div>
      <span class="slbl">Blocos fixos</span>
      <div class="sinfo"><strong>Ter & Qui</strong><br>Vier · Cricíuma<br><code>08:00–18:00</code></div>
    </aside>
    <div id="content">
      <div class="tab on" id="tab-gantt">
        <div class="wv-wrap">
          <div id="cbar" class="cbar"></div>
          <div class="wv-head">
            <div class="wv-tcol"><span>hora</span></div>
            <div class="wv-days-hdr" id="wv-days-hdr"></div>
          </div>
          <div class="wv-body" id="wv-body">
            <div class="wv-times" id="wv-times"></div>
            <div class="wv-days" id="wv-days"></div>
          </div>
        </div>
      </div>
      <div class="tab" id="tab-tasks">
        <div class="twrap">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--m200)">
            <div><h2 style="font-family:'Space Grotesk',system-ui;font-size:20px;font-weight:600">Tarefas</h2><p style="font-size:11px;color:var(--g500);margin-top:4px">Afazeres, cobranças, ligações e pendências</p></div>
            <button class="hbtn p" onclick="openTaskModal()">+ tarefa</button>
          </div>
          <div class="tfilters">
            <button class="tfbtn on" onclick="fTask('all',this)">Todas</button>
            <button class="tfbtn" onclick="fTask('pending',this)">Pendentes</button>
            <button class="tfbtn" onclick="fTask('today',this)">Hoje</button>
            <button class="tfbtn" onclick="fTask('overdue',this)">Atrasadas</button>
            <button class="tfbtn" onclick="fTask('done',this)">Concluídas</button>
          </div>
          <div class="tklist" id="tklist"></div>
        </div>
      </div>
      <div class="tab" id="tab-dash"><div class="dwrap" id="dwrap"></div></div>
      <div class="tab" id="tab-clients">
        <div class="clwrap">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--m200)">
            <div><h2 style="font-family:'Space Grotesk',system-ui;font-size:20px;font-weight:600">Clientes</h2></div>
            <button class="hbtn p" onclick="openCliModal()">+ cliente</button>
          </div>
          <div class="clgrid" id="clgrid"></div>
        </div>
      </div>
      <div class="tab" id="tab-year"><div class="ycwrap"><div class="ycal" id="ycal"></div></div></div>
      <div class="tab" id="tab-routines">
        <div class="rwrap">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--m200)">
            <div><h2 style="font-family:'Space Grotesk',system-ui;font-size:20px;font-weight:600">Rotinas</h2></div>
            <button class="hbtn s" onclick="addRoutine()">+ rotina</button>
          </div>
          <div class="rlist" id="rlist"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SELECTION BAR -->
<div id="sel-bar">
  <span id="sel-count">0 selecionados</span>
  <button onclick="lockSelected()">🔒 Travar</button>
  <button onclick="unlockSelected()">🔓 Destravar</button>
  <button class="danger" onclick="deleteSelected()">✕ Apagar selecionados</button>
  <button onclick="clearSelection()">Cancelar</button>
</div>

<!-- TOOLTIP -->
<div class="tt" id="tt"><div class="ttt" id="ttt"></div><div class="ttl" id="ttl"></div><div class="tts" id="tts"></div></div>

<!-- EVENT MODAL -->
<div class="mbg" id="evModal">
  <div class="mbox">
    <p class="mttl" id="evMttl">Novo evento</p>
    <div class="fg"><label class="fl">Título</label><input class="fi" id="eT" type="text"></div>
    <div class="frow"><div class="fg"><label class="fl">Data</label><input class="fi" id="eD" type="date"></div><div class="fg"><label class="fl">Hora</label><input class="fi" id="eH" type="time" value="09:00"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Duração (min)</label><input class="fi" id="eDur" type="number" value="60" min="15" step="15"></div><div class="fg"><label class="fl">Cliente</label><select class="fsel" id="eCli"></select></div></div>
    <div class="fg"><label class="fl">Tipo</label><select class="fsel" id="eTp"><option value="meeting">Reunião presencial</option><option value="online">Reunião online</option><option value="work">Bloco de trabalho</option><option value="deadline">Prazo / entrega</option></select></div>
    <div class="fg" style="flex-direction:row;align-items:center;gap:8px;background:var(--bone);border:1px solid var(--m200);border-radius:6px;padding:8px 12px;margin-bottom:0">
      <input type="checkbox" id="eLocked" style="accent-color:var(--b600);width:14px;height:14px;cursor:pointer;flex-shrink:0">
      <label for="eLocked" style="font-size:12px;color:var(--g600);cursor:pointer;line-height:1.4">Travar evento — cascata não altera este horário</label>
    </div>
    <div class="fg" style="margin-top:12px"><label class="fl">Descrição</label><textarea class="fta" id="eDesc" placeholder="Contexto, o que aconteceu, próximos passos..."></textarea></div>
    <div class="recur-sec" id="recurSec">
      <label class="recur-toggle"><input type="checkbox" id="eRecur" onchange="togRecur()">Evento recorrente</label>
      <div class="recur-opts" id="recurOpts">
        <div class="frow" style="margin-bottom:0">
          <div class="fg" style="margin-bottom:0"><label class="fl">Repetir</label><select class="fsel" id="eFreq"><option value="weekly">Toda semana</option><option value="biweekly">A cada 2 semanas</option><option value="monthly">Todo mês</option><option value="daily">Todo dia</option></select></div>
          <div class="fg" style="margin-bottom:0"><label class="fl">Até</label><input class="fi" id="eUntil" type="date"></div>
        </div>
      </div>
    </div>
    <div class="mbtns">
      <button class="mbdel" id="evDelBtn" onclick="delEv()" style="display:none;margin-right:auto">Deletar</button>
      <button class="mbcancel" onclick="closeEvModal()">Cancelar</button>
      <button class="mbsave" onclick="saveEv()">Salvar</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="mbg" id="taskModal">
  <div class="mbox">
    <p class="mttl" id="taskMttl">Nova tarefa</p>
    <div class="fg"><label class="fl">Título</label><input class="fi" id="tTitle" type="text"></div>
    <div class="frow"><div class="fg"><label class="fl">Prazo</label><input class="fi" id="tDue" type="date"></div><div class="fg"><label class="fl">Prioridade</label><select class="fsel" id="tPrio"><option value="high">Alta</option><option value="med" selected>Média</option><option value="low">Baixa</option></select></div></div>
    <div class="frow"><div class="fg"><label class="fl">Cliente</label><select class="fsel" id="tCli"></select></div><div class="fg"><label class="fl">Tipo</label><select class="fsel" id="tType"><option value="task">Tarefa</option><option value="call">Ligação</option><option value="charge">Cobrança</option><option value="doc">Documento</option><option value="meeting">Reunião</option></select></div></div>
    <div class="fg"><label class="fl">Descrição</label><textarea class="fta" id="tDesc" placeholder="Contexto, detalhes..."></textarea></div>
    <div class="recur-sec" id="tRecurSec" style="margin-bottom:12px">
      <label class="recur-toggle"><input type="checkbox" id="tRecur" onchange="togTaskRecur()">Tarefa recorrente</label>
      <div class="recur-opts" id="tRecurOpts">
        <div class="frow" style="margin-bottom:0">
          <div class="fg" style="margin-bottom:0"><label class="fl">Repetir</label><select class="fsel" id="tFreq"><option value="weekly">Toda semana</option><option value="biweekly">A cada 2 semanas</option><option value="monthly">Todo mês</option><option value="daily">Todo dia</option></select></div>
          <div class="fg" style="margin-bottom:0"><label class="fl">Até</label><input class="fi" id="tUntil" type="date"></div>
        </div>
      </div>
    </div>
    <div style="background:var(--b100);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--b600);margin-bottom:4px">✓ O prazo aparece automaticamente no calendário</div>
    <div class="mbtns">
      <button class="mbdel" id="taskDelBtn" onclick="delEditTask()" style="display:none;margin-right:auto">Deletar</button>
      <button class="mbcancel" onclick="closeTaskModal()">Cancelar</button>
      <button class="mbsave" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="mbg" id="cliModal">
  <div class="mbox wide">
    <p class="mttl" id="cliMttl">Novo cliente</p>
    <div class="frow"><div class="fg"><label class="fl">Nome</label><input class="fi" id="cName" type="text"></div><div class="fg"><label class="fl">Tipo</label><select class="fsel" id="cType"><option value="incorporadora">Incorporadora</option><option value="construtora">Construtora</option><option value="escritorio">Escritório</option><option value="engenharia">Engenharia</option><option value="outro">Outro</option></select></div></div>
    <div class="frow"><div class="fg"><label class="fl">Contato</label><input class="fi" id="cContact" type="text"></div><div class="fg"><label class="fl">Status</label><select class="fsel" id="cStatus"><option value="active">Ativo</option><option value="negotiation">Em negociação</option><option value="inactive">Inativo</option></select></div></div>
    <div class="fg"><label class="fl">Projetos ativos</label><input class="fi" id="cProjects" type="text"></div>
    <div class="fg"><label class="fl">Observações</label><input class="fi" id="cNotes" type="text"></div>
    <div class="fg"><label class="fl">Cor</label><div class="cpicker" id="cpicker"></div></div>
    <div class="mbtns"><button class="mbcancel" onclick="closeCliModal()">Cancelar</button><button class="mbsave" onclick="saveCli()">Salvar</button></div>
  </div>
</div>

<script>
const SH=7,EH=20,BASE_HPX=60,BLOCKED=[2,4];
const ZOOM_LEVELS=[0.7,0.85,1.0,1.2,1.5,1.8,2.2];
const COLORS=['#1E5A91','#D8902B','#3A4250','#2F7D5B','#B5392E','#8C5A14','#5C6675','#0B2746'];

const A={
  events:JSON.parse(localStorage.getItem('coreEv')||'[]'),
  tasks:JSON.parse(localStorage.getItem('coreTasks')||'[]'),
  routines:JSON.parse(localStorage.getItem('coreRot')||'null')||defR(),
  clients:JSON.parse(localStorage.getItem('coreCli')||'null')||defC(),
  done:JSON.parse(localStorage.getItem('coreDone')||'{}'),
  cli:{},types:{routine:true,event:true},
  mon:monday(new Date()),tab:'gantt',
  editEvId:null,editTaskId:null,editCliId:null,taskFilter:'all',
  selSet:new Set(),
  zoomIdx:2,dayOffset:0
};

function hpx(){return Math.round(BASE_HPX*ZOOM_LEVELS[A.zoomIdx])}
function visDays(){const z=ZOOM_LEVELS[A.zoomIdx];if(z<=1.0)return 7;if(z<=1.2)return 5;if(z<=1.5)return 4;if(z<=1.8)return 3;return 2;}
function zoomIn(){if(A.zoomIdx<ZOOM_LEVELS.length-1){A.zoomIdx++;rGantt()}}
function zoomOut(){if(A.zoomIdx>0){A.zoomIdx--;rGantt()}}
function pd(){A.dayOffset=Math.max(0,A.dayOffset-1);rGantt()}
function nd(){A.dayOffset=Math.min(6,A.dayOffset+(visDays()-1));rGantt()}

function defC(){return[{id:'vier',name:'Vier Engenharia',type:'engenharia',contact:'Equipe Vier',status:'active',projects:'5 obras ativas',notes:'Presença ter/qui Cricíuma',color:'#1E5A91'},{id:'dimer',name:'R. Dimer Empreendimentos',type:'incorporadora',contact:'Rodrigo · Tiago',status:'active',projects:'Oceano Home Resort, Casa Nammos, Casa Ferrari, Legend',notes:'Check-in seg e sex',color:'#D8902B'},{id:'core',name:'CORE (interno)',type:'outro',contact:'Rômulo Rocha',status:'active',projects:'Gestão interna',notes:'Blocos empresário',color:'#3A4250'},{id:'avalon',name:'Avalon Construtora',type:'construtora',contact:'—',status:'negotiation',projects:'Cronogramas de obra',notes:'Fluxo sendo definido',color:'#2F7D5B'}]}
function defR(){return[{id:uid(),name:'Post Instagram (@core)',freq:'semanal',day:'segunda',done:false},{id:uid(),name:'Revisão financeira · DRE · Fator R',freq:'semanal',day:'sexta',done:false},{id:uid(),name:'Reunião de planejamento CORE',freq:'semanal',day:'segunda',done:false},{id:uid(),name:'Check-in R. Dimer',freq:'semanal',day:'segunda',done:false},{id:uid(),name:'Check-in R. Dimer (fechamento)',freq:'semanal',day:'sexta',done:false},{id:uid(),name:'Análise de interferências',freq:'diária',day:'',done:false}]}

function uid(){return Math.random().toString(36).slice(2,9)}
function pad(n){return String(n).padStart(2,'0')}
function monday(d){const dt=new Date(d),dy=dt.getDay();dt.setDate(dt.getDate()-dy+(dy===0?-6:1));return dt}
function fiso(d){const dt=new Date(d);return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate())}
function fdmm(d){const dt=new Date(d);return pad(dt.getDate())+'/'+pad(dt.getMonth()+1)}
function ffull(d){const dt=new Date(d);return pad(dt.getDate())+'/'+pad(dt.getMonth()+1)+'/'+dt.getFullYear()}
function fwd(d){return['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(d).getDay()]}
function fwdf(d){return['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][new Date(d).getDay()]}
function fmon(d){return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][new Date(d).getMonth()]}
function minsToY(m){return((m-SH*60)/60)*hpx()}
function yToTime(y){const nm=Math.round((y/hpx()*60+SH*60)/15)*15;const nh=Math.floor(nm/60),nmin=nm%60;return pad(Math.max(SH,Math.min(EH-1,nh)))+':'+pad(nmin)}
function timeToMins(t){const p=t.split(':');return Number(p[0])*60+Number(p[1])}
function cliById(id){return A.clients.find(c=>c.id===id)||{name:id,color:'#8A95A4'}}
function save(){localStorage.setItem('coreEv',JSON.stringify(A.events));localStorage.setItem('coreTasks',JSON.stringify(A.tasks));localStorage.setItem('coreRot',JSON.stringify(A.routines));localStorage.setItem('coreCli',JSON.stringify(A.clients));localStorage.setItem('coreDone',JSON.stringify(A.done))}
function initFilters(){A.clients.forEach(c=>{if(!(c.id in A.cli))A.cli[c.id]=true});const w=document.getElementById('cliFilters');w.innerHTML='';A.clients.forEach(c=>{const l=document.createElement('label');l.className='cli';l.innerHTML='<input type="checkbox" '+(A.cli[c.id]?'checked':'')+' onchange="togCli(\''+c.id+'\')"><span class="dot" style="background:'+c.color+'"></span>'+c.name;w.appendChild(l)})}
function buildSel(id){const s=document.getElementById(id);if(!s)return;s.innerHTML='';A.clients.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;s.appendChild(o)})}

function weekR(mon){
  const evs=[],add=(di,h,m,dur,title,cli,notes)=>{const d=new Date(mon);d.setDate(d.getDate()+di);evs.push({id:'rt_'+di+'_'+h+'_'+m,title,date:fiso(d),time:pad(h)+':'+pad(m),duration:dur,client:cli,notes:notes||'',desc:'',isRoutine:true})};
  add(0,8,0,60,'Escritório · e-mail · ClickUp','core','Organização do dia');add(0,9,0,60,'Check-in R. Dimer','dimer','Demandas · ClickUp 4 obras');add(0,10,0,60,'Análise técnica · obra 1','dimer','Oceano Home Resort');add(0,11,0,60,'Análise técnica · obra 2','dimer','Casa Nammos');add(0,13,0,60,'Empresário · fluxo de caixa','core','');add(0,14,0,60,'Prospecção · novos clientes','core','');add(0,15,0,60,'Livre · encaixe','core','');add(0,16,0,60,'Livre · encaixe','core','');add(0,17,0,60,'Livre · incêndio','core','');add(0,18,0,60,'Livre · incêndio','core','');
  add(1,8,0,600,'Vier Engenharia · presencial','vier','Torres → Cricíuma · dia inteiro');
  add(2,8,0,60,'Escritório · e-mail · ClickUp','core','Organização do dia');add(2,9,0,60,'Compilação terça · Vier','vier','Processamento outputs');add(2,10,0,60,'Análise técnica · obra 3','dimer','Casa Ferrari');add(2,11,0,60,'Análise técnica · obra 4','dimer','Legend');add(2,13,0,60,'Financeiro CORE · DRE · Fator R','core','');add(2,14,0,60,'Admin · documentos · escopo','core','');add(2,15,0,60,'Livre · encaixe','core','');add(2,16,0,60,'Livre · encaixe','core','');add(2,17,0,60,'Livre · incêndio','core','');add(2,18,0,60,'Livre · incêndio','core','');
  add(3,8,0,600,'Vier Engenharia · presencial','vier','Torres → Cricíuma · dia inteiro');
  add(4,8,0,60,'Escritório · e-mail · ClickUp','core','Organização do dia');add(4,9,0,60,'Check-in R. Dimer · fechamento','dimer','Fechamento de semana');add(4,10,0,60,'Análise técnica · obras R. Dimer','dimer','Revisão geral 4 obras');add(4,11,0,60,'Compilação quinta · Vier','vier','Processamento outputs');add(4,13,0,60,'Empresário · estratégia CORE','core','');add(4,14,0,60,'Comercial · propostas','core','');add(4,15,0,60,'Livre · encaixe','core','');add(4,16,0,60,'Livre · encaixe','core','');add(4,17,0,60,'Livre · incêndio','core','');add(4,18,0,60,'Livre · incêndio','core','');
  add(5,8,0,60,'Estratégia · crescimento CORE','core','Válvula de segurança');add(5,9,0,60,'Análise profunda · pendências','core','');
  return evs;
}

function expRecur(evs,s,e){const out=[];evs.forEach(ev=>{if(!ev.recur){out.push(ev);return}const base=new Date(ev.date),until=ev.recur.until?new Date(ev.recur.until):e;let cur=new Date(base);while(cur<=until&&cur<=e){if(cur>=s)out.push(Object.assign({},ev,{date:fiso(cur),_rid:ev.id}));if(ev.recur.freq==='daily')cur.setDate(cur.getDate()+1);else if(ev.recur.freq==='weekly')cur.setDate(cur.getDate()+7);else if(ev.recur.freq==='biweekly')cur.setDate(cur.getDate()+14);else if(ev.recur.freq==='monthly')cur.setMonth(cur.getMonth()+1);else break}});return out}

// CASCATA
function relocateEvent(evId,newTime,visited){
  if(!visited)visited=new Set();
  if(visited.has(evId))return;
  visited.add(evId);
  const idx=A.events.findIndex(x=>x.id===evId);
  if(idx<0)return;
  const ev=A.events[idx];
  if(ev.locked)return;
  ev.time=newTime;
  const evS=timeToMins(ev.time),evE=evS+(ev.duration||60);
  A.events.forEach(other=>{
    if(other.id===evId||visited.has(other.id)||other.date!==ev.date||other.locked)return;
    const os=timeToMins(other.time),oe=os+(other.duration||60);
    if(evS<oe&&evE>os){
      const pushH=Math.floor(evE/60),pushM=evE%60;
      relocateEvent(other.id,pad(Math.min(pushH,EH-1))+':'+pad(pushM),visited);
    }
  });
}

// RENDER SEMANA
function rGantt(){
  const HP=hpx(),vis=visDays(),z=ZOOM_LEVELS[A.zoomIdx];
  const sun=new Date(A.mon);sun.setDate(sun.getDate()+6);
  document.getElementById('wlbl').textContent=fdmm(A.mon)+' – '+fdmm(sun);
  document.getElementById('zlvl').textContent=z.toFixed(1).replace('.',',')+' ×';
  const dnav=document.getElementById('dnav');
  dnav.classList.toggle('show',vis<7);
  if(vis<7){
    const dS=new Date(A.mon);dS.setDate(dS.getDate()+A.dayOffset);
    const dE=new Date(A.mon);dE.setDate(dE.getDate()+Math.min(A.dayOffset+vis-1,6));
    document.getElementById('dlbl').textContent=fdmm(dS)+' – '+fdmm(dE);
  }
  if(A.dayOffset+vis>7)A.dayOffset=Math.max(0,7-vis);
  const HDR=document.getElementById('wv-days-hdr'),TC=document.getElementById('wv-times'),DAYS=document.getElementById('wv-days');
  HDR.innerHTML='';TC.innerHTML='';DAYS.innerHTML='';
  const totH=(EH-SH)*HP;
  for(let h=SH;h<=EH;h++){const s=document.createElement('div');s.className='wv-tslot'+(h%2===0?' maj':'');s.style.height=HP+'px';s.textContent=h<EH?pad(h)+':00':'';TC.appendChild(s)}
  const today=fiso(new Date()),wS=new Date(A.mon),wE=new Date(A.mon);wE.setDate(wE.getDate()+6);
  const rtEvs=weekR(A.mon),userEvs=expRecur(A.events,wS,wE),conflicts=[];
  for(let i=A.dayOffset;i<A.dayOffset+vis;i++){
    const d=new Date(A.mon);d.setDate(d.getDate()+i);
    const ds=fiso(d),dow=d.getDay(),isBlk=BLOCKED.includes(dow),isWknd=dow===0||dow===6,isTod=ds===today;
    // Header
    const dh=document.createElement('div');
    dh.className='wv-dh'+(isTod?' tod':'')+(isBlk?' blk':'');
    dh.innerHTML='<div class="wv-dname">'+fwd(d)+'</div><div class="wv-dnum">'+d.getDate()+'</div>'+(isBlk?'<div class="wv-dtag vt">Vier</div>':isWknd?'':'<div class="wv-dtag ft">Torres</div>');
    dh.onclick=(function(date){return function(){document.getElementById('eD').value=date;openEvModal()}})(ds);
    HDR.appendChild(dh);
    // Coluna
    const col=document.createElement('div');
    col.className='wv-day'+(isBlk?' blk':isWknd?' wknd':'');
    col.style.height=totH+'px';
    col.dataset.date=ds;
    for(let h=SH;h<EH;h++){const l=document.createElement('div');l.className='wv-hline'+(h%2===0?' maj':' min');l.style.top=((h-SH)*HP)+'px';col.appendChild(l)}
    if(isTod){const nm=new Date().getHours()*60+new Date().getMinutes();if(nm>=SH*60&&nm<=EH*60){const nl=document.createElement('div');nl.className='wv-nowline';nl.style.top=minsToY(nm)+'px';col.appendChild(nl)}}
    if(isBlk){const b=document.createElement('div');b.className='wv-blkl';b.innerHTML='<span>VIER · CRICÍUMA</span>';col.appendChild(b)}
    // Eventos: rotinas com override suprimidas
    const overridden=new Set(A.events.filter(x=>x._overrideRoutine&&x.date===ds).map(x=>x._overrideRoutine));
    // Suprimir rotinas explicitamente deletadas neste dia
    const deletedRt=new Set(Object.keys(A.done).filter(k=>k.startsWith('_del_')&&k.endsWith('_'+ds)).map(k=>k.replace('_del_','').replace('_'+ds,'')));
    const dayRt=A.types.routine?rtEvs.filter(e=>e.date===ds&&A.cli[e.client]&&!overridden.has(e.id)&&!deletedRt.has(e.id)):[];
    const dayUsr=A.types.event?userEvs.filter(e=>e.date===ds&&A.cli[e.client]&&!e.isRoutine):[];
    const allEvs=[...dayRt,...dayUsr].sort((a,b)=>timeToMins(a.time)-timeToMins(b.time));
    // Conflitos
    const tm={};allEvs.forEach(e=>{if(!tm[e.time])tm[e.time]=[];tm[e.time].push(e)});
    Object.values(tm).forEach(g=>{if(g.length>1)conflicts.push(fwd(d)+' '+g[0].time)});
    // Overlap groups
    function overlapGroup(ev,list){const s=timeToMins(ev.time),e2=s+(ev.duration||60);return list.filter(o=>{const os=timeToMins(o.time),oe=os+(o.duration||60);return s<oe&&e2>os})}
    const placed=new Set();
    allEvs.forEach(e=>{
      if(placed.has(e.id))return;
      const grp=overlapGroup(e,allEvs);
      grp.forEach(x=>placed.add(x.id));
      const gc=grp.length;
      grp.forEach((ge,gi)=>{
        const sm=timeToMins(ge.time),em=sm+(ge.duration||60);
        const tp=minsToY(sm),hp2=Math.max(minsToY(em)-tp,22);
        const cw=Math.floor(100/gc),cl=gi*cw;
        const dk=ge.id+'_'+ds,isDone=!!A.done[dk];
        const cli=cliById(ge.client);
        const isLocked=!!ge.locked,isSel=A.selSet.has(ge.id);
        const el=document.createElement('div');
        el.className='gevt '+ge.client+'-ev'+(ge.isRoutine?' routine-ev':'')+(isDone?' done-ev':'')+(isLocked?' locked-ev':'')+(isSel?' selected-ev':'');
        el.style.cssText='top:'+tp+'px;height:'+hp2+'px;left:calc('+cl+'% + 2px);width:calc('+cw+'% - 4px);border-left-color:'+cli.color;
        // Conteúdo: sem template literal
        const descEl=ge.desc?'<div class="esub">'+ge.desc+'</div>':'';
        // Ações: checkbox sempre, delete só em não-rotina
        const isPast=(ds<today)||(ds===today&&timeToMins(ge.time)<new Date().getHours()*60+new Date().getMinutes());
        const showDel=!ge.isRoutine||(ge.isRoutine&&isPast);
        const actHtml='<div class="ev-actions">'+(showDel?'<button class="ev-del" title="Apagar">×</button>':'')+'<input type="checkbox" class="ev-cb" '+(isDone?'checked':'')+'></div>';
        el.innerHTML='<div class="etime">'+ge.time+(ge.duration?' · '+ge.duration+'m':'')+'</div><div class="etitle">'+ge.title+'</div>'+descEl+actHtml;
        // Checkbox done
        el.querySelector('.ev-cb').addEventListener('change',function(ev2){ev2.stopPropagation();A.done[dk]=ev2.target.checked;save();el.classList.toggle('done-ev',ev2.target.checked)});
        // Botão delete
        const delBtn=el.querySelector('.ev-del');
        if(delBtn)delBtn.addEventListener('click',function(ev2){
          ev2.stopPropagation();
          if(!confirm('Substituir "'+ge.title+'" por tempo livre?'))return;
          const freeDate=ds,freeTime=ge.time,freeDur=ge.duration||60,freeCli=ge.client;
          if(ge.isRoutine){
            const existing=A.events.findIndex(x=>x._overrideRoutine===ge.id&&x.date===ds);
            if(existing>-1){A.events.splice(existing,1);}
            A.done['_del_'+ge.id+'_'+ds]=true;
          } else {
            A.events=A.events.filter(x=>x.id!==ge.id);
          }
          replaceWithFree(freeDate,freeTime,freeDur,freeCli);
          save();rGantt();
        });
        // Ctrl+click = seleção múltipla
        el.addEventListener('click',function(ev2){if(ev2.ctrlKey||ev2.metaKey){ev2.stopPropagation();toggleSel(ge.id,el)}});
        // Tooltip
        el.addEventListener('mouseenter',function(ev2){document.getElementById('ttt').textContent=fwdf(d)+' · '+ge.time;document.getElementById('ttl').textContent=ge.title;document.getElementById('tts').textContent=ge.desc||ge.notes||cli.name;document.getElementById('tt').classList.add('show');posTT(ev2)});
        el.addEventListener('mousemove',posTT);
        el.addEventListener('mouseleave',function(){document.getElementById('tt').classList.remove('show')});
        // Duplo clique
        let lastTap=0;
        el.addEventListener('pointerup',function(pev){
          if(pev.target.classList.contains('ev-cb')||pev.target.classList.contains('ev-del'))return;
          const now=Date.now();
          if(now-lastTap<380){
            lastTap=0;
            if(ge.isRoutine){
              // Override: busca ou cria
              const existing=A.events.findIndex(x=>x._overrideRoutine===ge.id&&x.date===ds);
              if(existing>-1){
                openEvModal(A.events[existing].id);
              } else {
                const ov={id:uid(),title:ge.title,date:ds,time:ge.time,duration:ge.duration,client:ge.client,type:'work',desc:ge.notes||'',notes:'',isRoutine:false,locked:false,_overrideRoutine:ge.id};
                A.events.push(ov);
                save();
                openEvModal(ov.id);
              }
            } else {
              openEvModal(ge.id);
            }
          } else {lastTap=now}
        });
        // Drag só em não-locked e não-rotina
        if(!ge.isRoutine&&!ge.locked)attachDrag(el,ge,tp,totH);
        col.appendChild(el);
      });
    });
    // Click vazio
    col.addEventListener('click',function(ev2){
      if(ev2.target===col||ev2.target.classList.contains('wv-hline')||ev2.target.classList.contains('wv-blkl')){
        const y=ev2.clientY-col.getBoundingClientRect().top;
        document.getElementById('eD').value=ds;
        document.getElementById('eH').value=yToTime(y);
        openEvModal();
      }
    });
    DAYS.appendChild(col);
  }
  const cb=document.getElementById('cbar');
  if(conflicts.length){cb.classList.add('show');cb.textContent='Conflito: '+conflicts.slice(0,3).join(', ')+'.'}else cb.classList.remove('show');
  const body=document.getElementById('wv-body');
  if(body.dataset.scrolled!=='1'){body.scrollTop=minsToY((SH+1)*60);body.dataset.scrolled='1'}
}

function posTT(ev){const t=document.getElementById('tt');let x=ev.clientX+14,y=ev.clientY-10;if(x+220>window.innerWidth)x=ev.clientX-224;t.style.left=x+'px';t.style.top=y+'px'}

// DRAG
function attachDrag(el,ev,origTop,totH){
  let pid=null,sy=0,st=0,moved=false;
  el.addEventListener('pointerdown',function(e){
    if(e.target.classList.contains('ev-cb')||e.target.classList.contains('ev-del'))return;
    pid=e.pointerId;sy=e.clientY;st=parseFloat(el.style.top)||origTop;moved=false;
    el.setPointerCapture(pid);
    document.getElementById('tt').classList.remove('show');
  });
  el.addEventListener('pointermove',function(e){
    if(e.pointerId!==pid)return;
    const dy=e.clientY-sy;
    if(Math.abs(dy)>6){
      moved=true;el.classList.add('dragging');
      el.style.top=Math.max(0,Math.min(totH-(ev.duration||60)/60*hpx(),st+dy))+'px';
      el.querySelector('.etime').textContent=yToTime(parseFloat(el.style.top))+(ev.duration?' · '+ev.duration+'m':'');
    }
  });
  el.addEventListener('pointerup',function(e){
    if(e.pointerId!==pid)return;
    pid=null;el.classList.remove('dragging');
    if(moved){
      moved=false;
      const nt=yToTime(parseFloat(el.style.top));
      const idx=A.events.findIndex(x=>x.id===ev.id);
      if(idx>-1){
        A.events[idx].time=nt;
        relocateEvent(ev.id,nt,new Set([ev.id]));
        save();
      }
      rGantt();
    }
  });
  el.addEventListener('pointercancel',function(){pid=null;moved=false;el.classList.remove('dragging');el.style.top=origTop+'px'});
}

// TAREFAS
function rTasks(){
  const list=document.getElementById('tklist');list.innerHTML='';
  const today=fiso(new Date());
  let tasks=[...A.tasks];
  if(A.taskFilter==='pending')tasks=tasks.filter(t=>!t.done);
  else if(A.taskFilter==='today')tasks=tasks.filter(t=>t.due===today&&!t.done);
  else if(A.taskFilter==='overdue')tasks=tasks.filter(t=>t.due&&t.due<today&&!t.done);
  else if(A.taskFilter==='done')tasks=tasks.filter(t=>t.done);
  tasks.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const p={high:0,med:1,low:2};return p[a.prio||'med']-p[b.prio||'med']});
  if(!tasks.length){const e=document.createElement('div');e.style.cssText='text-align:center;padding:40px;color:var(--g400);font-size:13px';e.textContent='Nenhuma tarefa.';list.appendChild(e);return}
  const pm={high:'Alta',med:'Média',low:'Baixa'};
  const tm={task:'Tarefa',call:'Ligação',charge:'Cobrança',doc:'Documento',meeting:'Reunião'};
  // Cores semânticas por tipo
  const typeColor={task:'var(--b600)',call:'var(--s600)',charge:'var(--d600)',doc:'var(--g500)',meeting:'var(--a500)'};
  const typeBg={task:'var(--b100)',call:'var(--s100)',charge:'var(--d100)',doc:'var(--m100)',meeting:'var(--a100)'};
  tasks.forEach(function(t){
    const cli=cliById(t.client);
    const isOv=t.due&&t.due<today&&!t.done,isTod=t.due===today&&!t.done;
    const card=document.createElement('div');
    card.className='tkcard'+(t.done?' done-task':'');
    // Borda esquerda colorida pelo cliente
    card.style.borderLeft='3px solid '+cli.color;
    // Linha 1: checkbox
    const chk=document.createElement('input');chk.type='checkbox';chk.className='tkchk';if(t.done)chk.checked=true;
    chk.addEventListener('change',function(){doneTask(t.id)});
    card.appendChild(chk);
    // Corpo clicável
    const body=document.createElement('div');body.className='tkbody';
    body.addEventListener('click',function(){openTaskModal(t.id)});
    // Título
    const ttl=document.createElement('div');ttl.className='tktitle';ttl.textContent=t.title;body.appendChild(ttl);
    // Meta row
    const meta=document.createElement('div');meta.className='tkmeta';
    // Badge cliente
    const cliSpan=document.createElement('span');cliSpan.className='tkcli';
    cliSpan.style.background=cli.color+'22';cliSpan.style.color=cli.color;
    cliSpan.textContent=cli.name.split(' ')[0];meta.appendChild(cliSpan);
    // Badge tipo com cor semântica
    if(t.type){const tSpan=document.createElement('span');tSpan.className='tktype';
      tSpan.style.background=typeBg[t.type]||'var(--m100)';tSpan.style.color=typeColor[t.type]||'var(--g500)';
      tSpan.textContent=tm[t.type]||t.type;meta.appendChild(tSpan);}
    // Badge prioridade
    const prioSpan=document.createElement('span');prioSpan.className='tkprio p'+((t.prio||'m')[0]);prioSpan.textContent=pm[t.prio||'med'];meta.appendChild(prioSpan);
    // Prazo
    if(t.due){const dueSpan=document.createElement('span');dueSpan.className='tkdue'+(isOv?' ov':isTod?' tod':'');dueSpan.textContent=(isOv?'⚠ Atrasado · ':isTod?'Hoje · ':'')+ffull(t.due);meta.appendChild(dueSpan);}
    body.appendChild(meta);
    // Recorrência badge
    if(t.recur){const rSpan=document.createElement('span');rSpan.style.cssText='font-size:9px;color:var(--b600);background:var(--b100);padding:2px 6px;border-radius:999px;font-weight:600';rSpan.textContent='↻ '+({weekly:'semanal',biweekly:'quinzenal',monthly:'mensal',daily:'diário'}[t.recur.freq]||t.recur.freq);meta.appendChild(rSpan);}
    // Descrição
    if(t.desc){const desc=document.createElement('div');desc.style.cssText='font-size:11px;color:var(--g500);margin-top:4px';desc.textContent=t.desc;body.appendChild(desc);}
    card.appendChild(body);
    // Botão deletar
    const del=document.createElement('button');del.className='tkdel';del.textContent='×';del.title='Deletar tarefa';
    del.addEventListener('click',function(e){e.stopPropagation();delTask(t.id)});
    card.appendChild(del);
    list.appendChild(card);
  });
}

  document.getElementById('tDue').value=fiso(new Date());
  document.getElementById('tPrio').value='med';
  document.getElementById('tFreq').value='weekly';
  document.getElementById('tUntil').value='';
  document.getElementById('taskMttl').textContent=id?'Editar tarefa':'Nova tarefa';
  document.getElementById('taskDelBtn').style.display=id?'block':'none';
  if(id){
    const t=A.tasks.find(x=>x.id===id);
    if(!t)return;
    document.getElementById('tTitle').value=t.title||'';
    document.getElementById('tDue').value=t.due||'';
    document.getElementById('tPrio').value=t.prio||'med';
    document.getElementById('tCli').value=t.client||'';
    document.getElementById('tType').value=t.type||'task';
    document.getElementById('tDesc').value=t.desc||'';
    if(t.recur&&t.recur.freq){
      document.getElementById('tRecur').checked=true;
      document.getElementById('tRecurOpts').className='recur-opts show';
      document.getElementById('tFreq').value=t.recur.freq;
      document.getElementById('tUntil').value=t.recur.until||'';
    }
  }
  document.getElementById('taskModal').classList.add('open');
  setTimeout(function(){document.getElementById('tTitle').focus()},150);
}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('open');A.editTaskId=null}
function togTaskRecur(){
  document.getElementById('tRecurOpts').classList.toggle('show',document.getElementById('tRecur').checked);
  if(document.getElementById('tRecur').checked&&!document.getElementById('tUntil').value){const d=new Date();d.setMonth(d.getMonth()+3);document.getElementById('tUntil').value=fiso(d)}
}
function genTaskEvents(taskId,title,cli,due,recur){
  A.events=A.events.filter(x=>x._taskId!==taskId);
  if(!due)return;
  const makeEv=function(date){return{id:'task_'+uid(),title:'⚑ '+title,date:date,time:'08:00',duration:30,client:cli,type:'deadline',notes:'',desc:'',isRoutine:false,_taskId:taskId}};
  if(!recur||!recur.freq){A.events.push(makeEv(due));return;}
  // Parsear como local para evitar UTC shift
  function parseLocal(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
  function toISO(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
  let cur=parseLocal(due);
  const untilStr=recur.until&&recur.until.length===10?recur.until:'';
  const until=untilStr?parseLocal(untilStr):parseLocal(due.slice(0,4)+'-12-31');
  let safety=0;
  while(cur<=until&&safety<200){
    A.events.push(makeEv(toISO(cur)));
    safety++;
    if(recur.freq==='daily')cur.setDate(cur.getDate()+1);
    else if(recur.freq==='weekly')cur.setDate(cur.getDate()+7);
    else if(recur.freq==='biweekly')cur.setDate(cur.getDate()+14);
    else if(recur.freq==='monthly')cur.setMonth(cur.getMonth()+1);
    else break;
  }
}
function saveTask(){
  const title=document.getElementById('tTitle').value.trim();if(!title){alert('Título obrigatório.');return}
  const due=document.getElementById('tDue').value,cli=document.getElementById('tCli').value;
  const isRecur=document.getElementById('tRecur').checked;
  const recur=isRecur?{freq:document.getElementById('tFreq').value,until:document.getElementById('tUntil').value}:null;
  const data={title,due,client:cli,prio:document.getElementById('tPrio').value,type:document.getElementById('tType').value,desc:document.getElementById('tDesc').value.trim(),recur};
  if(A.editTaskId){
    const idx=A.tasks.findIndex(x=>x.id===A.editTaskId);
    if(idx>-1){A.tasks[idx]=Object.assign({},A.tasks[idx],data);genTaskEvents(A.editTaskId,title,cli,due,recur);}
  } else {
    const t=Object.assign({id:uid(),done:false},data);
    A.tasks.push(t);
    genTaskEvents(t.id,title,cli,due,recur);
  }
  save();closeTaskModal();rTasks();if(A.tab==='gantt')rGantt();if(A.tab==='year')rYear();
}
function delEditTask(){
  if(!A.editTaskId)return;
  const t=A.tasks.find(x=>x.id===A.editTaskId);
  if(!t)return;
  if(!confirm('Excluir tarefa "'+t.title+'"?'))return;
  A.tasks=A.tasks.filter(x=>x.id!==A.editTaskId);
  A.events=A.events.filter(x=>x._taskId!==A.editTaskId);
  save();closeTaskModal();rTasks();
}

// DASHBOARD
function rDash(){
  const w=document.getElementById('dwrap');w.innerHTML='';
  const wS=new Date(A.mon),wE=new Date(A.mon);wE.setDate(wE.getDate()+6);
  const rtEvs=weekR(A.mon),userEvs=expRecur(A.events,wS,wE),allEvs=[...rtEvs,...userEvs];
  const hpc={};A.clients.forEach(c=>{hpc[c.id]=0});allEvs.forEach(e=>{if(e.client in hpc)hpc[e.client]+=(e.duration||60)/60});
  const totalH=Object.values(hpc).reduce(function(a,b){return a+b},0)||1;
  const wSs=fiso(wS),wEs=fiso(wE);
  const doneEvs=allEvs.filter(e=>{const k=e.id+'_'+e.date;return A.done[k]&&e.date>=wSs&&e.date<=wEs});
  const pctDone=allEvs.length?Math.round(doneEvs.length/allEvs.length*100):0;
  const rtDone=A.routines.filter(r=>r.done).length,rtPct=A.routines.length?Math.round(rtDone/A.routines.length*100):0;
  const today=fiso(new Date());
  const tPend=A.tasks.filter(t=>!t.done).length,tOv=A.tasks.filter(t=>!t.done&&t.due&&t.due<today).length;
  let streak=0;for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);if(Object.keys(A.done).some(k=>k.endsWith('_'+fiso(d))&&A.done[k]))streak++;else break}
  const kg=document.createElement('div');kg.className='dgrid';
  [{l:'Horas planejadas',v:Math.round(totalH)+'h',s:'semana atual'},{l:'Atividades concluídas',v:pctDone+'%',s:doneEvs.length+' de '+allEvs.length,c:pctDone>=70?'pos':'warn'},{l:'Tarefas pendentes',v:tPend,s:tOv?'⚠ '+tOv+' atrasadas':'Em dia',c:tOv?'warn':'pos'},{l:'Rotinas executadas',v:rtPct+'%',s:rtDone+' de '+A.routines.length,c:rtPct>=80?'pos':'warn'}].forEach(function(k){const card=document.createElement('div');card.className='kpi';card.innerHTML='<div class="klbl">'+k.l+'</div><div class="kval '+(k.c||'')+'">'+k.v+'</div><div class="ksub">'+k.s+'</div>';kg.appendChild(card)});
  w.appendChild(kg);
  const bc=document.createElement('div');bc.className='bchart';bc.innerHTML='<h4>Tempo por cliente · semana</h4>';
  A.clients.forEach(function(c){const h=hpc[c.id]||0,pct=Math.round(h/totalH*100);const row=document.createElement('div');row.className='brow';row.innerHTML='<div class="blbl2">'+c.name.split(' ')[0]+'</div><div class="btrack"><div class="bfill" style="width:'+pct+'%;background:'+c.color+'"></div></div><div class="bval">'+Math.round(h)+'h</div>';bc.appendChild(row)});
  w.appendChild(bc);
  const dr=document.createElement('div');dr.className='drow2';
  const sc=document.createElement('div');sc.className='scard';sc.innerHTML='<div class="klbl">Streak</div><div class="snum">'+streak+'</div><div class="ksub">dias consecutivos</div>';dr.appendChild(sc);
  const rl=document.createElement('div');rl.className='rdash';rl.innerHTML='<div class="klbl" style="margin-bottom:10px">Rotinas</div>';
  A.routines.slice(0,6).forEach(function(r){const row=document.createElement('div');row.className='rrow';row.innerHTML='<span style="font-size:11px">'+r.name+'</span><span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:'+(r.done?'var(--s600)':'var(--g400)')+'">'+( r.done?'✓':'pendente')+'</span>';rl.appendChild(row)});
  dr.appendChild(rl);w.appendChild(dr);
  const ai=document.createElement('div');ai.className='ai-card';ai.innerHTML='<h4>Resumo semanal com IA</h4><div id="ai-body" class="ai-body" style="color:var(--g400);font-style:italic">Clique em "Gerar resumo" para análise automática desta semana.</div><div style="margin-top:12px"><button class="hbtn p" onclick="genAI()" id="aiBtn">Gerar resumo</button></div>';
  w.appendChild(ai);
}

async function genAI(){
  const btn=document.getElementById('aiBtn'),body=document.getElementById('ai-body');
  if(!btn||!body)return;btn.disabled=true;btn.textContent='Gerando...';
  body.innerHTML='<div class="ai-loading"><div class="aidot"></div><div class="aidot"></div><div class="aidot"></div><span style="margin-left:6px">Analisando...</span></div>';
  const wS=new Date(A.mon),wE=new Date(A.mon);wE.setDate(wE.getDate()+6);
  const rtEvs=weekR(A.mon),userEvs=expRecur(A.events,wS,wE),allEvs=[...rtEvs,...userEvs];
  const hpc={};A.clients.forEach(c=>{hpc[c.id]=0});allEvs.forEach(e=>{if(e.client in hpc)hpc[e.client]+=(e.duration||60)/60});
  const descs=A.events.filter(e=>e.desc&&e.date>=fiso(wS)&&e.date<=fiso(wE)).map(e=>'- '+e.title+': '+e.desc).join('\n');
  const horasStr=A.clients.map(c=>c.name+': '+Math.round(hpc[c.id]||0)+'h').join(', ');
  const prompt='Você é assistente da CORE — Coordenação Técnica. Gere resumo semanal executivo em pt-BR, tom técnico.\n\nSEMANA: '+fdmm(wS)+' a '+fdmm(wE)+'\nHORAS: '+horasStr+'\nTAREFAS PENDENTES: '+(A.tasks.filter(t=>!t.done).map(t=>t.title).join(', ')||'Nenhuma')+'\nDESCRIÇÕES: '+(descs||'Nenhuma')+'\n\n3-4 parágrafos, texto corrido.';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();body.textContent=data.content&&data.content[0]?data.content[0].text:'Não foi possível gerar.';
  }catch(e){body.textContent='Erro ao gerar resumo.'}
  btn.disabled=false;btn.textContent='Atualizar resumo';
}

// CLIENTES

function openCliModal(id){
  A.editCliId=id||null;document.getElementById('cliMttl').textContent=id?'Editar cliente':'Novo cliente';
  const cp=document.getElementById('cpicker');cp.innerHTML='';
  COLORS.forEach(function(col){const d=document.createElement('div');d.className='copt';d.style.background=col;d.dataset.color=col;d.onclick=function(){document.querySelectorAll('.copt').forEach(function(x){x.classList.remove('sel')});d.classList.add('sel')};cp.appendChild(d)});
  if(id){const c=A.clients.find(x=>x.id===id);if(c){document.getElementById('cName').value=c.name;document.getElementById('cType').value=c.type;document.getElementById('cContact').value=c.contact;document.getElementById('cStatus').value=c.status;document.getElementById('cProjects').value=c.projects||'';document.getElementById('cNotes').value=c.notes||'';const opt=cp.querySelector('[data-color="'+c.color+'"]');if(opt)opt.classList.add('sel')}}
  else{['cName','cContact','cProjects','cNotes'].forEach(function(x){document.getElementById(x).value=''});cp.querySelector('.copt').classList.add('sel')}
  document.getElementById('cliModal').classList.add('open');
}
function closeCliModal(){document.getElementById('cliModal').classList.remove('open')}
function saveCli(){
  const name=document.getElementById('cName').value.trim();if(!name){alert('Informe o nome.');return}
  const sel=document.querySelector('.copt.sel');const color=sel?sel.dataset.color:COLORS[0];
  const data={name,type:document.getElementById('cType').value,contact:document.getElementById('cContact').value,status:document.getElementById('cStatus').value,projects:document.getElementById('cProjects').value,notes:document.getElementById('cNotes').value,color};
  if(A.editCliId){const idx=A.clients.findIndex(x=>x.id===A.editCliId);if(idx>-1)A.clients[idx]=Object.assign({},A.clients[idx],data)}
  else A.clients.push(Object.assign({id:uid()},data));
  save();closeCliModal();rClients();initFilters();buildSel('eCli');buildSel('tCli');
}
function delCli(id){const c=A.clients.find(x=>x.id===id);if(c&&confirm('Remover "'+c.name+'"?')){A.clients=A.clients.filter(x=>x.id!==id);save();rClients();initFilters();buildSel('eCli');buildSel('tCli')}}

// CALENDÁRIO ANUAL
function rYear(){
  const g=document.getElementById('ycal');g.innerHTML='';
  const ts=fiso(new Date()),td=new Set(A.tasks.filter(t=>!t.done&&t.due).map(t=>t.due));
  for(let m=5;m<17;m++){
    const yr=m<12?2026:2027,mo=m<12?m:m-12;
    const card=document.createElement('div');card.className='mcrd';
    const h=document.createElement('div');h.className='mhdr';h.textContent=fmon(new Date(yr,mo,1))+' '+yr;card.appendChild(h);
    const gd=document.createElement('div');gd.className='mgrid';
    ['D','S','T','Q','Q','S','S'].forEach(function(dn){const l=document.createElement('div');l.className='wdl';l.textContent=dn;gd.appendChild(l)});
    const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0),st=new Date(first);st.setDate(st.getDate()-first.getDay());
    let cur=new Date(st);
    while(cur<=last||cur.getDay()!==0){
      const ds=fiso(cur),hasEv=A.events.some(e=>e.date===ds&&!e._taskId),hasTk=td.has(ds),isBlk=BLOCKED.includes(cur.getDay())&&cur.getMonth()===mo;
      const el=document.createElement('div');el.className='cd'+(cur.getMonth()!==mo?' other':'')+(hasTk?' hastask':hasEv?' hasev':'')+(isBlk?' blkd':'')+(ds===ts?' today':'');
      el.textContent=cur.getDate();el.onclick=(function(d){return function(){document.getElementById('eD').value=d;openEvModal()}})(ds);
      gd.appendChild(el);cur.setDate(cur.getDate()+1);
    }
    card.appendChild(gd);g.appendChild(card);
  }
}

// ROTINAS
function rRoutines(){
  const l=document.getElementById('rlist');l.innerHTML='';
  A.routines.forEach(function(r){const c=document.createElement('div');c.className='rcrd'+(r.done?' done':'');c.innerHTML='<div style="flex:1"><div class="rn">'+r.name+'</div><div class="rm">'+r.freq+(r.day?' · '+r.day:'')+'</div></div><input type="checkbox" '+(r.done?'checked':'')+' style="accent-color:var(--b600);width:15px;height:15px;cursor:pointer" onchange="doneR(\''+r.id+'\')">'; l.appendChild(c)});
}
function doneR(id){const r=A.routines.find(x=>x.id===id);if(r){r.done=!r.done;save();rRoutines()}}
function addRoutine(){const name=prompt('Nome da rotina:');if(!name)return;const freq=prompt('Frequência:','semanal')||'semanal';const day=prompt('Dia (vazio se diária):','')||'';A.routines.push({id:uid(),name,freq,day,done:false});save();rRoutines()}

// SELEÇÃO MÚLTIPLA
function toggleSel(id,el){
  if(A.selSet.has(id)){A.selSet.delete(id);el.classList.remove('selected-ev')}
  else{A.selSet.add(id);el.classList.add('selected-ev')}
  updateSelBar();
}
function updateSelBar(){const bar=document.getElementById('sel-bar'),n=A.selSet.size;if(n>0){bar.classList.add('show');document.getElementById('sel-count').textContent=n+' selecionado'+(n>1?'s':'')}else bar.classList.remove('show')}
function clearSelection(){A.selSet=new Set();updateSelBar();rGantt()}
function deleteSelected(){if(!A.selSet.size)return;if(!confirm('Apagar '+A.selSet.size+' evento(s)?'))return;A.events=A.events.filter(x=>!A.selSet.has(x.id));A.selSet=new Set();save();updateSelBar();rGantt()}
function lockSelected(){A.events.forEach(x=>{if(A.selSet.has(x.id))x.locked=true});save();clearSelection()}
function unlockSelected(){A.events.forEach(x=>{if(A.selSet.has(x.id))x.locked=false});save();clearSelection()}
